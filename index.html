<style>
  :root{
    --bg:#0e0e14; --surface:#16161f; --surface-2:#1e1e2b; --surface-3:#26263a;
    --text:#f4f1ea; --muted:#8c8ca0; --faint:#5c5c70;
    --lime:#c6f24e; --lime-d:#9fd02a;
    --red:#ff3b5c; --red-d:#d61f43;
    --gold:#ffcb45;
    --border:rgba(255,255,255,.09);
    --display:'Bricolage Grotesque',system-ui,sans-serif;
    --body:'Sora',system-ui,sans-serif;
    --pad:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%;height:100%}
  body{
    min-height:100%;background:var(--bg);color:var(--text);font-family:var(--body);
    background-image:
      radial-gradient(circle at 15% -10%, rgba(198,242,78,.07), transparent 40%),
      radial-gradient(circle at 90% 110%, rgba(255,59,92,.08), transparent 45%);
    background-attachment:fixed;overflow-x:hidden;
  }
  #app{
    max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
    padding:0 max(var(--pad),env(safe-area-inset-left)) calc(40px + env(safe-area-inset-bottom)) max(var(--pad),env(safe-area-inset-right));
  }
  body.has-footer #app{padding-bottom:calc(64px + env(safe-area-inset-bottom))}
  #appfooter{
    position:fixed;left:0;right:0;bottom:0;z-index:40;display:none;
    align-items:center;justify-content:center;gap:11px;
    padding:9px 14px calc(9px + env(safe-area-inset-bottom));
    background:rgba(14,14,20,.9);backdrop-filter:blur(10px);
    border-top:1px solid var(--border);font-size:12px;color:var(--muted);
  }
  body.has-footer #appfooter{display:flex}
  #appfooter .kofi{background:var(--gold);color:#1a1407;font-weight:700;padding:7px 13px;border-radius:9px;text-decoration:none;font-size:12.5px;white-space:nowrap;flex:0 0 auto;transition:.15s}
  #appfooter .kofi:active{transform:scale(.95)}
  #appfooter .ftxt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  #appfooter .ftxt b{color:var(--text)}
  .bar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;
    padding:calc(14px + env(safe-area-inset-top)) 0 12px;background:linear-gradient(var(--bg) 72%,transparent);backdrop-filter:blur(4px)}
  .brand{font-family:var(--display);font-weight:800;font-size:clamp(17px,5vw,20px);letter-spacing:-.02em;line-height:1;display:flex;align-items:center;gap:6px;min-width:0}
  .brand span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand b{color:var(--lime)}
  .bar-meta{margin-left:auto;display:flex;gap:7px;flex:0 0 auto}
  .pill{font-size:12px;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:7px 11px;border-radius:20px;display:flex;align-items:center;gap:5px;cursor:pointer;transition:.15s;white-space:nowrap}
  .pill:active{transform:scale(.94)}
  .pill b{color:var(--text)}
  h1{font-family:var(--display);font-weight:800;letter-spacing:-.03em;line-height:.95}
  .screen{animation:rise .35s cubic-bezier(.2,.8,.2,1) both;flex:1;display:flex;flex-direction:column}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .stagger>*{animation:rise .4s cubic-bezier(.2,.8,.2,1) both}
  .stagger>*:nth-child(1){animation-delay:.02s}.stagger>*:nth-child(2){animation-delay:.07s}
  .stagger>*:nth-child(3){animation-delay:.12s}.stagger>*:nth-child(4){animation-delay:.17s}
  .stagger>*:nth-child(5){animation-delay:.22s}.stagger>*:nth-child(6){animation-delay:.27s}
  .muted{color:var(--muted)}.faint{color:var(--faint)}
  .center{text-align:center}
  .row{display:flex;gap:10px;align-items:center}
  .grow{flex:1;min-width:0}
  .btn{font-family:var(--body);font-weight:700;font-size:16px;border:none;border-radius:16px;padding:16px 18px;width:100%;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:9px;line-height:1.15;text-align:center}
  .btn:active{transform:scale(.97)}
  .btn-lime{background:var(--lime);color:#10100a}
  .btn-red{background:var(--red);color:#fff}
  .btn-ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
  .btn-gold{background:var(--gold);color:#241c00}
  .btn-lg{padding:19px;font-size:17px;border-radius:20px}
  .btn-sm{padding:11px 14px;font-size:14px;border-radius:12px;width:auto}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:18px}
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:15px;text-align:left;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .tile:active{transform:scale(.97)}
  .tile.disabled{opacity:.36;pointer-events:none}
  .tile .emoji{font-size:25px;line-height:1}
  .tile .tname{font-family:var(--display);font-weight:700;font-size:16px;margin-top:7px;letter-spacing:-.02em;line-height:1.05}
  .tile .tdesc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.32}
  .tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 7px;border-radius:7px;margin-top:9px}
  .tag.imp{background:rgba(255,59,92,.16);color:#ff8298}
  .tag.reg{background:rgba(198,242,78,.16);color:var(--lime)}
  .tag.esc{background:rgba(120,180,255,.16);color:#8ec0ff}
  .tag.deb{background:rgba(255,203,69,.16);color:var(--gold)}
  .tag.maf{background:rgba(168,130,255,.16);color:#bda4ff}
  .tag.perf{background:rgba(95,217,194,.16);color:#5fd9c2}
  .tag.vote{background:rgba(255,110,180,.16);color:#ff8fc4}
  .tag.intimo{background:rgba(255,92,138,.18);color:#ff7aa0}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-size:13px;font-weight:600;padding:9px 12px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:.15s}
  .chip:active{transform:scale(.95)}
  .chip.on{background:var(--lime);color:#10100a;border-color:var(--lime)}
  .chip.rm{padding-right:9px}
  .stepper{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .stepper button{width:48px;height:48px;background:none;border:none;color:var(--text);font-size:24px;font-weight:700;cursor:pointer;flex:0 0 auto}
  .stepper button:active{background:var(--surface-3)}
  .stepper .val{flex:1;text-align:center;font-family:var(--display);font-weight:700;font-size:20px;min-width:54px}
  .pinput{display:flex;gap:8px;margin-bottom:14px}
  .pinput input{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 15px;color:var(--text);font-family:var(--body);font-size:16px;outline:none}
  .pinput input:focus{border-color:var(--lime)}
  .plist{display:flex;flex-direction:column;gap:8px}
  .prow{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px}
  .pnum{width:26px;height:26px;border-radius:50%;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted);flex:0 0 auto}
  .prow .pn{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .xbtn{background:none;border:none;color:var(--faint);font-size:20px;cursor:pointer;padding:4px 6px;line-height:1;flex:0 0 auto}
  .xbtn:active{color:var(--red)}
  .pass{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;padding:24px 4px;flex:1}
  .reveal-card{width:100%;border-radius:24px;padding:30px 20px;min-height:270px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;border:1px solid var(--border);transition:.2s;position:relative}
  .reveal-card.hidden{background:var(--surface-2)}
  .reveal-card.shown.cidade{background:linear-gradient(160deg,#1a2410,#0e0e14);border-color:var(--lime)}
  .reveal-card.shown.impostor{background:linear-gradient(160deg,#2a0f17,#0e0e14);border-color:var(--red)}
  .reveal-card .big{font-family:var(--display);font-weight:800;font-size:clamp(30px,9vw,42px);letter-spacing:-.03em;line-height:1.02;margin:6px 0;word-break:break-word;hyphens:auto}
  .reveal-card .big.imp{color:var(--red)}
  .reveal-card .big.cid{color:var(--lime)}
  .flip-in{animation:flip .35s ease both}
  @keyframes flip{from{opacity:0;transform:rotateX(40deg) scale(.95)}to{opacity:1;transform:none}}
  .kicker{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .timer-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin:22px 0}
  .timer{font-family:var(--display);font-weight:800;font-size:clamp(64px,24vw,96px);letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums}
  .timer.warn{color:var(--red);animation:pulse .6s infinite alternate}
  @keyframes pulse{to{transform:scale(1.06)}}
  .srow{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:9px;transition:.3s}
  .srow .rank{font-family:var(--display);font-weight:800;font-size:22px;width:34px;text-align:center;color:var(--faint);flex:0 0 auto}
  .srow.top1{border-color:var(--gold);background:linear-gradient(120deg,rgba(255,203,69,.1),var(--surface))}
  .srow.top1 .rank{color:var(--gold)}
  .srow .sn{flex:1;min-width:0;font-weight:600;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .srow .sp{font-family:var(--display);font-weight:800;font-size:24px;flex:0 0 auto}
  .lead{font-size:15px;line-height:1.55;color:var(--muted)}
  .sec-label{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:22px 0 11px}
  .note{font-size:13px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--lime);border-radius:10px;padding:11px 13px;line-height:1.5}
  .note.imp{border-left-color:var(--red)}
  .spacer{height:14px}
  .big-emoji{font-size:clamp(48px,15vw,58px);line-height:1}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:50}
  .conf{position:absolute;width:9px;height:14px;top:-20px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.8}}
  .resume{background:linear-gradient(120deg,rgba(255,203,69,.12),var(--surface));border:1px solid rgba(255,203,69,.4)}
  @media (max-width:360px){:root{--pad:13px}.tile .tname{font-size:15px}.btn{font-size:15px}}
  @media (min-width:560px){.reveal-card{min-height:300px}}
</style>
</head>

function save(){
  try{

function load(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return;
    const d=JSON.parse(raw);
    if(d&&typeof d==='object'){
      S.players=Array.isArray(d.players)?d.players:[];
      S.theme=d.theme||'geral';
      S.rounds=d.rounds||5; S.discuss=d.discuss||120;
      S.currentRound=d.currentRound||1;
      S.customWords=Array.isArray(d.customWords)?d.customWords:[];

      S.players.forEach(p=>{if(p.score==null)p.score=0;if(p.impTimes==null)p.impTimes=0;});
    }

}
function hasProgress(){return S.players.length>0 && (S.currentRound>1 || S.players.some(p=>p.score>0));}

   HELPERS
========================================================= */
const $=(s)=>document.querySelector(s);
const app=$('#app');
const rnd=(n)=>Math.floor(Math.random()*n);
const shuffle=(a)=>{a=[...a];for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;};
const esc=(s)=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function playable(g){return S.players.length>=g.min && S.players.length<=g.max;}
function fmt(t){t=Math.max(0,t);const m=Math.floor(t/60),s=t%60;return m+':'+String(s).padStart(2,'0');}
function themeItems(){
  const it = S.theme==='custom' ? S.customWords : (THEMES[S.theme]?THEMES[S.theme].items:null);
  return (it&&it.length) ? it : THEMES.geral.items;
}
function themeLabel(){
  if(S.theme==='custom') return 'Meu tema ✏️';
  return THEMES[S.theme] ? THEMES[S.theme].label : 'Geral 🎲';
}
function pickWord(items){
  let w,t=0;
  do{w=items[rnd(items.length)];t++;}while(w===S.lastWord && items.length>1 && t<8);
  S.lastWord=w; return w;
}
const lastPick={};
function pickNoRepeat(list,key){
  if(!list||!list.length)return undefined;
  if(list.length===1)return list[0];
  let pool=list;
  if(key&&lastPick[key]!==undefined)pool=list.filter(x=>x!==lastPick[key]);
  if(!pool.length)pool=list;
  const v=pool[rnd(pool.length)];
  if(key)lastPick[key]=v;
  return v;
}
function debateSplit(aLabel,bLabel){
  if(S.players.length<4)return null;
  const idx=shuffle(S.players.map((_,i)=>i));
  const half=Math.ceil(idx.length/2);
  const a=idx.slice(0,half).sort((x,y)=>x-y);
  const b=idx.slice(half).sort((x,y)=>x-y);
  return {a,b,aLabel,bLabel};
}
function go(scr){S.screen=scr;render();window.scrollTo(0,0);}

/* =========================================================
   MONTAGEM DE RODADA
========================================================= */
function startGame(g){S.game=g;S.lastGameId=g.id;go('briefing');}

function buildRound(){
  const g=S.game, P=S.players, n=P.length;
  const items=themeItems();
  let r={revealIdx:0};

  if(g.fam==='imp'){
    const nImp=g.impostors||1;
    const impSet=shuffle([...Array(n).keys()]).slice(0,nImp);
    r.impostors=impSet; r.cards=[];
    impSet.forEach(i=>{ if(P[i])P[i].impTimes=(P[i].impTimes||0)+1; });
    if(g.id==='camaleao'||g.id==='duplo'){
      const word=pickWord(items); r.secretWord=word;
      const impLabel=g.id==='duplo'?'IMPOSTOR':'CAMALEÃO';
      for(let i=0;i<n;i++){
        r.cards.push(impSet.includes(i)
          ? {type:'imp', big:`VOCÊ É O<br>${impLabel}`, sub:'Você não recebeu o segredo. Misture-se sem se entregar.'}
          : {type:'cid', kicker:'O segredo é', big:word, sub:'Dê uma pista sutil. Não entregue o segredo.'});
      }
    } else if(g.id==='invertida'){
      const pair=pickNoRepeat(QPAIRS,'qpairs'); r.pair=pair;
      for(let i=0;i<n;i++){
        r.cards.push({type:'cid', kicker:'Sua pergunta', big:'❓',
          q: impSet.includes(i)?pair[1]:pair[0], sub:'Leia em segredo e diga sua resposta em voz alta agora.'});
      }
    } else if(g.id==='coordenada'){
      const k=Math.min(6, Math.max(2, items.length));
      const list=shuffle(items).slice(0,k); r.list=list;
      const realN=1+rnd(k); let impN; do{impN=1+rnd(k);}while(impN===realN&&k>1);
      r.realN=realN; r.impN=impN;
      for(let i=0;i<n;i++){
        const num=impSet.includes(i)?impN:realN;
        r.cards.push({type:'cid', list, num, kicker:'Seu número secreto', big:String(num),
          sub:'Fale uma palavra ligada ao item número '+num+'.'});
      }
    }
  }
  else if(g.fam==='reg'){
    r.host=rnd(n);
    if(g.variants){ const v=pickNoRepeat(g.variants,'scenario'); r.secret=v.secret; r.scenario={name:v.name,prompt:v.prompt}; }
    else { r.secret=g.secret; }
  }
  else if(g.id==='escala'){
    const prompt=pickNoRepeat(SCALE_PROMPTS,'scale'); r.prompt=prompt;
    const nums=shuffle([...Array(10).keys()].map(x=>x+1)).slice(0,n);
    r.cards=nums.map((num)=>({type:'cid',kicker:prompt,big:String(num),sub:'Dê um exemplo dessa intensidade — sem dizer o número.'}));
  }
  else if(g.id==='pistas'){ r.clueGiver=rnd(n); r.concept=pickWord(items); }
  else if(g.id==='botao'){ r.debate={head:'Aperta ou não?',text:pickNoRepeat(BOTAO,'botao'),split:debateSplit('🔴 APERTA','⚪ NÃO APERTA')}; }
  else if(g.id==='opiniao'){ r.debate={head:'Concorda ou discorda?',text:pickNoRepeat(OPINIOES,'opiniao'),split:debateSplit('✅ CONCORDA','❌ DISCORDA')}; }
  else if(g.id==='inutil'){ r.debate={head:'Defenda o absurdo:',text:pickNoRepeat(INUTIL,'inutil')}; }
  else if(g.id==='entrevista'){ r.performer=rnd(n); r.character=pickNoRepeat(PERSONAGENS,'pers'); r.questions=shuffle(ENTREVISTA_Q).slice(0,5); }
  else if(g.id==='provavel'){ r.prompt=pickNoRepeat(MAIS_PROVAVEL,'prov'); }
  else if(g.id==='verdades'){ r.teller=rnd(n); r.liePos=1+rnd(3); r.hint=pickNoRepeat(VERDADES_HINT,'vh'); }
  else if(g.id==='quemdisse'){ r.prompt=pickNoRepeat(QUEMDISSE,'qd'); r.answers=[]; r.collectIdx=0; }
  else if(g.id==='proibida'){ r.clueGiver=rnd(n); r.taboo=pickNoRepeat(TABOO,'taboo'); }
  else if(g.id==='silenciosas'){ r.prompt=pickNoRepeat(SILENCIOSAS,'sil'); }
  else if(g.id==='quentes'){ r.prompt=pickNoRepeat(QUENTES,'qt'); }
  S.round=r;
}

function award(idxList,pts){idxList.forEach(i=>{if(S.players[i])S.players[i].score+=pts;});}
function nextRoundOrEnd(){
  if(S.currentRound>=S.rounds){go('champion');}
  else{S.currentRound++;S.game=null;S.round=null;go('play');}
}
function resetNight(){
  S.players.forEach(p=>{p.score=0;p.impTimes=0;});
  S.currentRound=1;S.game=null;S.round=null;S.lastGameId=null;S.lastWord=null;
  S.maf=null;S.hist=null;S.stats={games:{},rounds:0};
}

function nextHistWord(){
  const h=S.hist; let pool=HIST_WORDS;
  if(h.used.length>=HIST_WORDS.length)h.used=[];
  pool=HIST_WORDS.filter(w=>!h.used.includes(w));
  const w=pool[rnd(pool.length)]; h.used.push(w); return w;
}
function initHistoria(){
  S.hist={ order:shuffle(S.players.map((_,i)=>i)), pos:0, turn:1, used:[], word:'' };
  S.hist.word=nextHistWord();
}

let timerInt=null, wakeLock=null;
let histInt=null;
function histTickStart(){
  clearInterval(histInt);
  const dur=15, endAt=Date.now()+dur*1000;
  const upd=()=>{
    if(S.screen!=='histTurn'){clearInterval(histInt);return;}
    const left=Math.max(0,Math.ceil((endAt-Date.now())/1000));
    const el=$('#htimer');
    if(el){ el.textContent=fmt(left); el.style.color = left<=5&&left>0 ? 'var(--gold)' : (left<=0?'var(--red)':''); }
    if(left<=0){clearInterval(histInt);if(el)el.textContent='Tempo!';if(navigator.vibrate)navigator.vibrate(150);}
  };
  upd(); histInt=setInterval(upd,250);
}
async function requestWake(){try{if('wakeLock'in navigator){wakeLock=await navigator.wakeLock.request('screen');}}catch(e){}}
function releaseWake(){try{if(wakeLock){wakeLock.release();wakeLock=null;}}catch(e){}}
function beep(){try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return;const a=new A();const o=a.createOscillator();const g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(.001,a.currentTime);g.gain.exponentialRampToValueAtTime(.25,a.currentTime+.02);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.6);o.start();o.stop(a.currentTime+.65);setTimeout(()=>a.close(),800);}catch(e){}}
function viewDiscuss(){
  const left=S.round.timeLeft;
  return `${bar()}<div class="screen center">
    <div class="kicker" style="margin-top:14px">${S.game.fam==='imp'?'Discussão — achem o impostor':'Discussão'}</div>
    <div class="timer-wrap"><div class="timer ${left<=15&&left>0?'warn':''}" id="timer">${fmt(left)}</div></div>
    <div class="row" style="gap:9px">
      <button class="btn btn-ghost grow" data-action="timerToggle" id="ttg">${S.round.paused?'▶ Continuar':'⏸ Pausar'}</button>
      <button class="btn btn-ghost grow" data-action="addTime">+30s</button>
    </div>
    <div class="spacer"></div>
    <button class="btn btn-red btn-lg" data-action="toResolve">Encerrar e resolver →</button>
  </div>`;
}
function tickStart(){
  clearInterval(timerInt); requestWake();
  timerInt=setInterval(()=>{
    if(S.screen!=='discuss'){clearInterval(timerInt);releaseWake();return;}
    if(S.round.paused)return;
    const left=Math.max(0,Math.ceil((S.round.endAt-Date.now())/1000));
    S.round.timeLeft=left;
    const el=$('#timer');
    if(el){el.textContent=fmt(left);el.classList.toggle('warn',left<=15&&left>0);}
    if(left<=0){clearInterval(timerInt);if(navigator.vibrate)navigator.vibrate([200,100,200]);beep();}
  },250);
}

  const rows=sorted.map((p,k)=>`
    <div class="srow ${k===0&&p.score>0?'top1':''}">
      <div class="rank">${k===0&&p.score>0?'👑':k+1}</div>
      <div class="sn">${esc(p.name)}</div>
      <div class="sp">${p.score}</div>

  return `${bar()}<div class="screen">
    <h1 style="font-size:clamp(26px,9vw,32px);margin-top:6px">Placar</h1>

function nightStatsHTML(){
  const st=S.stats||{games:{},rounds:0};
  const entries=Object.entries(st.games||{});
  const anyImp=S.players.some(p=>(p.impTimes||0)>0);
  if(!entries.length && !anyImp)return '';
  const rows=[];
  const totalRounds=st.rounds||entries.reduce((a,[,c])=>a+c,0);
  rows.push(['🎲','Rodadas jogadas', String(totalRounds)]);
  if(entries.length){
    const sorted=[...entries].sort((a,b)=>b[1]-a[1]);
    const [gid,cnt]=sorted[0];
    const g=GAMES.find(x=>x.id===gid);
    rows.push([g?g.emoji:'🎮','Jogo da noite', `${g?g.name:gid} · ${cnt}×`]);
    rows.push(['🗂️','Jogos diferentes', String(entries.length)]);
  }
  const imp=S.players.map(p=>({n:p.name,c:p.impTimes||0})).filter(p=>p.c>0).sort((a,b)=>b.c-a.c);
  if(imp.length){
    const top=imp[0].c, who=imp.filter(p=>p.c===top).map(p=>p.n).join(' & ');
    rows.push(['🕵️','O mais suspeito', `${who} · ${top}× impostor`]);
  }
  const body=rows.map(([e,k,v])=>`<div style="display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px">
    <div style="font-size:20px;line-height:1">${e}</div>
    <div style="flex:1;font-size:13px;color:var(--muted)">${k}</div>
    <div style="font-size:14px;font-weight:700;text-align:right">${esc(v)}</div>
  </div>`).join('');
  return `<div class="sec-label" style="margin:24px 0 10px">📊 A noite em números</div>${body}`;
}
function viewChampion(){
  const sorted=[...S.players].map((p,i)=>({...p,i})).sort((a,b)=>b.score-a.score);
  const top=sorted[0]?sorted[0].score:0;
  const champs=sorted.filter(p=>p.score===top&&top>0);
  const champName=champs.length>1?champs.map(c=>c.name).join(' & '):(sorted[0]?sorted[0].name:'—');
  const skip=Math.max(1,champs.length);
  const rows=sorted.slice(skip).map((p,k)=>`
    <div class="srow"><div class="rank">${k+1+skip}</div><div class="sn">${esc(p.name)}</div><div class="sp">${p.score}</div></div>`).join('');
  return `${bar()}<div class="screen center">
    <div class="confetti" id="conf"></div>
    <div class="kicker" style="margin-top:20px">${champs.length>1?'Empate no topo!':'Campeão da noite'}</div>
    <div class="big-emoji" style="margin:16px 0;font-size:clamp(56px,18vw,70px)">🏆</div>
    <h1 style="font-size:clamp(32px,11vw,46px);color:var(--gold)">${esc(champName)}</h1>
    <p class="muted" style="margin:8px 0 24px">${top} pontos</p>
    <div style="text-align:left">${rows}</div>
    <div style="text-align:left">${nightStatsHTML()}</div>
    <div class="spacer"></div>
    <button class="btn btn-lime btn-lg" data-action="newNight">🔁 Nova noite (zerar placar)</button>
    <div style="height:9px"></div>
    <button class="btn btn-ghost" data-action="moreRounds">➕ Jogar mais 3 rodadas</button>
  </div>`;
}

    case 'histResolve':html=viewHistResolve();break;
    case 'provavel':html=viewProvavel();break;
    case 'provavelResolve':html=viewProvavelResolve();break;
    case 'verdadesReveal':html=viewVerdadesReveal();break;

    case 'quemdisseVote':html=viewQuemdisseVote();break;

    case 'silenciosas':html=viewSilenciosas();break;
    case 'silenciosasResolve':html=viewSilenciosasResolve();break;
    case 'quentes':html=viewQuentes();break;
    case 'quentesResolve':html=viewQuentesResolve();break;
    case 'debate':html=viewDebate();break;
    case 'discuss':html=viewDiscuss();break;
    case 'resolve':html=viewResolve();break;
    case 'scoreboard':html=viewScoreboard();break;
    case 'champion':html=viewChampion();break;
    case 'mafSetup':html=viewMafSetup();break;
    case 'mafDeal':html=viewMafDeal();break;
    case 'mafNight':html=viewMafNight();break;
    case 'mafTurn':html=viewMafTurn();break;
    case 'mafDay':html=viewMafDay();break;
    case 'mafVote':html=viewMafVote();break;
    case 'mafVoteResult':html=viewMafVoteResult();break;
    case 'mafOver':html=viewMafOver();break;
  }
  app.innerHTML=html;
  document.body.classList.toggle('has-footer', ['home','intro','champion','scoreboard','players','config'].includes(S.screen));
  if(S.screen==='discuss')tickStart();
  if(S.screen==='histTurn')histTickStart();
  if(S.screen==='players'){const inp=$('#pname');if(inp){inp.focus();inp.onkeydown=e=>{if(e.key==='Enter')addPlayer();};}}
  if(S.screen==='quemdisseCollect'){const inp=$('#qans');if(inp){inp.focus();inp.onkeydown=e=>{if(e.key==='Enter')quemdisseSubmit();};}}
  if(S.screen==='config'){const ci=$('#cword');if(ci){ci.onkeydown=e=>{if(e.key==='Enter')addCustom();};}}
  if(S.screen==='champion'||S.screen==='mafOver')confetti();
  save();
}

/* =========================================================
   AÇÕES
========================================================= */
function addPlayer(){
  const inp=$('#pname');if(!inp)return;
  const name=inp.value.trim();if(!name)return;
  S.players.push({name,score:0,impTimes:0});render();
}
function addCustom(){
  const inp=$('#cword');if(!inp)return;
  const parts=inp.value.split(/[,\n;]+/).map(s=>s.trim()).filter(Boolean);
  if(!parts.length)return;
  parts.forEach(w=>{if(!S.customWords.some(x=>x.toLowerCase()===w.toLowerCase()))S.customWords.push(w);});
  render();
}
function quemdisseSubmit(){
  const r=S.round, inp=$('#qans');
  const txt=inp?inp.value.trim():'';
  r.answers.push({by:r.collectIdx, text:txt||'(em branco)'});
  r.collectIdx++;
  if(r.collectIdx>=S.players.length){ r.shuffled=shuffle(r.answers); r.qsel=null; go('quemdisseVote'); }
  else render();
}
function routeRoundStart(){
  const g=S.game;
  if(g.id==='mafia'){ initMafiaSetup(); go('mafSetup'); return; }
  if(g.id==='historia'){ initHistoria(); go('histTurn'); return; }
  buildRound();
  if(g.id==='entrevista')go('entrevistaReveal');
  else if(g.id==='provavel')go('provavel');
  else if(g.id==='verdades')go('verdadesReveal');
  else if(g.id==='quemdisse')go('quemdisseCollect');
  else if(g.id==='proibida')go('proibidaReveal');
  else if(g.id==='silenciosas')go('silenciosas');
  else if(g.id==='quentes')go('quentes');
  else if(g.fam==='imp'||g.id==='escala')go('reveal');
  else if(g.fam==='reg')go('hostReveal');
  else if(g.id==='pistas')go('clueReveal');
  else if(g.fam==='deb')go('debate');
}
function setupRound(){
  if(!S.stats)S.stats={games:{},rounds:0};
  S.stats.games[S.game.id]=(S.stats.games[S.game.id]||0)+1;
  S.stats.rounds=(S.stats.rounds||0)+1;
  routeRoundStart();
}
function applyResolve(action){
  const g=S.game,r=S.round;const parts=action.split(':');
  if(g.fam==='imp'){
    if(parts[1]==='cidade'){const inn=S.players.map((_,i)=>i).filter(i=>!r.impostors.includes(i));award(inn,1);}
    else{award(r.impostors,2);}
  } else if(g.fam==='reg'){
    if(parts[2]==='host')award([r.host],2);
  } else if(g.id==='escala'){
    if(parts[2]==='1')award(S.players.map((_,i)=>i),1);
  } else if(g.id==='pistas'){
    if(parts[2]!=='none')award([+parts[2],r.clueGiver],1);
  } else if(g.id==='proibida'){
    if(parts[2]!=='none')award([+parts[2],r.clueGiver],1);
  } else if(g.id==='entrevista'){
    if(parts[2]==='1')award([r.performer],1);
  }
  nextRoundOrEnd();
}

/* =========================================================
   MÁFIA (modo autocontido — o celular é o narrador)
========================================================= */
function defaultMafia(n){ if(n<=6)return 1; if(n<=9)return 2; if(n<=12)return 3; return 4; }
function mafCitizens(){ const m=S.maf; return m.n - m.mafiaCount - (m.detective?1:0) - (m.doctor?1:0); }
function mafSetupValid(){ const m=S.maf; return m.mafiaCount>=1 && m.mafiaCount*2<m.n && mafCitizens()>=0; }
function initMafiaSetup(){
  const n=S.players.length;
  S.maf={ n, mafiaCount:defaultMafia(n), detective:true, doctor:true,
    roles:[], alive:[], night:1,
    dealIdx:0, dealFlipped:false,
    turnOrder:[], turnPos:0, turnRevealed:false, turnPick:null,
    mafiaPicks:{}, doctorSave:null,
    lastVictim:null, lastSaved:false, eliminated:null,
    winner:null, scored:false };
}
function dealMafiaRoles(){
  const m=S.maf, idx=S.players.map((_,i)=>i);
  const order=shuffle(idx);
  const roles=new Array(m.n).fill('cidadao');
  let p=0;
  for(let k=0;k<m.mafiaCount;k++)roles[order[p++]]='mafia';
  if(m.detective)roles[order[p++]]='detective';
  if(m.doctor)roles[order[p++]]='doctor';
  m.roles=roles;
  m.alive=new Array(m.n).fill(true);
  m.dealIdx=0; m.dealFlipped=false;
  go('mafDeal');
}
function roleName(r){ return r==='mafia'?'Máfia':r==='detective'?'Detetive':r==='doctor'?'Médico':'Cidadão'; }
function mafCounts(){
  const m=S.maf; let maf=0,city=0;
  m.roles.forEach((r,i)=>{ if(!m.alive[i])return; if(r==='mafia')maf++; else city++; });
  return {maf,city};
}
function checkWin(){
  const {maf,city}=mafCounts();
  if(maf===0)return 'cidade';
  if(maf>=city)return 'mafia';
  return null;
}
function resolveNight(){
  const m=S.maf;
  const tally={};
  Object.values(m.mafiaPicks).forEach(t=>{ if(t!=null)tally[t]=(tally[t]||0)+1; });
  let victim=null, best=-1, tied=[];
  Object.keys(tally).forEach(k=>{ const v=tally[k]; if(v>best){best=v;tied=[+k];}else if(v===best)tied.push(+k); });
  if(tied.length)victim=tied[rnd(tied.length)];
  if(victim!=null && m.doctorSave===victim){ m.lastVictim=null; m.lastSaved=true; }
  else if(victim!=null){ m.alive[victim]=false; m.lastVictim=victim; m.lastSaved=false; }
  else { m.lastVictim=null; m.lastSaved=false; }
  m.winner=checkWin();
}
function endMafia(){
  const m=S.maf;
  if(!m.scored){
    const win=m.winner;
    const idxs=S.players.map((_,i)=>i).filter(i=> win==='mafia' ? m.roles[i]==='mafia' : m.roles[i]!=='mafia');
    award(idxs,2);
    m.scored=true;
  }
  go('mafOver');
}

document.addEventListener('click',(e)=>{
  const t=e.target.closest('[data-action],[data-go],[data-game],[data-rm],[data-theme],[data-step],[data-rmcw]');
  if(!t)return;
  if(t.dataset.go){go(t.dataset.go);return;}
  if(t.dataset.rm!==undefined){S.players.splice(+t.dataset.rm,1);render();return;}
  if(t.dataset.rmcw!==undefined){S.customWords.splice(+t.dataset.rmcw,1);render();return;}
  if(t.dataset.theme){S.theme=t.dataset.theme;render();return;}
  if(t.dataset.step){
    const [k,d]=t.dataset.step.split(':');const dv=+d;
    if(k==='rounds')S.rounds=Math.max(1,Math.min(30,S.rounds+dv));
    if(k==='discuss')S.discuss=Math.max(30,Math.min(600,S.discuss+dv));
    render();return;
  }
  if(t.dataset.game){const g=GAMES.find(x=>x.id===t.dataset.game);if(g&&playable(g))startGame(g);return;}

  const a=t.dataset.action;
  switch(true){
    case a==='toPlay':go(S.players.length>=2?'play':'players');break;
    case a==='introDone':S.seenIntro=true;go('home');break;
    case a==='installApp':{if(deferredPrompt){const dp=deferredPrompt;deferredPrompt=null;dp.prompt();dp.userChoice.finally(()=>render());}break;}
    case a==='newOrKeep':resetNight();go(S.players.length>=2?'play':'players');break;
    case a==='addP':addPlayer();break;
    case a==='addCW':addCustom();break;
    case a==='sortear':{
      let pool=GAMES.filter(g=>playable(g)&&g.fam!=='intimo');if(!pool.length)return;
      if(pool.length>1)pool=pool.filter(g=>g.id!==S.lastGameId);
      startGame(pool[rnd(pool.length)]);break;
    }
    case a==='setupRound':setupRound();break;
    case a==='flip':{
      const c=$('#rcard');const card=S.round.cards[S.round.revealIdx];
      if(c.classList.contains('hidden')){
        c.className='reveal-card shown '+(card.type==='imp'?'impostor':'cidade')+' flip-in';
        c.innerHTML=cardInner(card)+'<div style="margin-top:18px"><button class="btn btn-ghost btn-sm" data-action="nextReveal">Já vi — próximo →</button></div>';
      }break;
    }
    case a==='nextReveal':S.round.revealIdx++;render();break;
    case a==='flipHost':{
      const c=$('#rcard');
      c.className='reveal-card shown cidade flip-in';
      c.innerHTML=`<div class="kicker">Regra secreta</div><p style="font-size:16px;line-height:1.55;margin-top:12px">${S.round.secret||S.game.secret||''}</p><div style="margin-top:18px"><button class="btn btn-lime btn-sm" data-action="toDiscuss">Entendi — começar ⏱</button></div>`;
      break;
    }
    case a==='reHost':S.round.host=rnd(S.players.length);render();break;
    case a==='flipClue':{
      const c=$('#rcard');
      c.className='reveal-card shown cidade flip-in';
      c.innerHTML=`<div class="kicker">Conceito secreto</div><div class="big cid" style="font-size:clamp(26px,8vw,34px);margin:12px 0">${esc(S.round.concept)}</div><p class="muted" style="font-size:13px">Dê 3 pistas, uma de cada vez.</p><div style="margin-top:16px"><button class="btn btn-lime btn-sm" data-action="toDiscuss">Começar ⏱</button></div>`;
      break;
    }
    case a==='reClue':S.round.clueGiver=rnd(S.players.length);render();break;
    case a==='flipEntrevista':{
      const c=$('#rcard');if(!c)break;
      c.className='reveal-card shown cidade flip-in';
      c.innerHTML=`<div class="kicker">Seu personagem secreto</div><div class="big cid" style="font-size:clamp(20px,6.5vw,28px);margin:12px 0">${esc(S.round.character)}</div><p class="muted" style="font-size:13px">Responda tudo como esse personagem. Não saia dele!</p><div style="margin-top:16px"><button class="btn btn-lime btn-sm" data-action="toEntrevistaQ">Memorizei — passar pro grupo →</button></div>`;
      break;
    }
    case a==='reEntrevista':S.round.performer=rnd(S.players.length);S.round.character=PERSONAGENS[rnd(PERSONAGENS.length)];render();break;
    case a==='toEntrevistaQ':go('entrevistaQ');break;
    case a==='histNext':{const h=S.hist;h.pos=(h.pos+1)%h.order.length;h.turn++;h.word=nextHistWord();render();break;}
    case a==='histEnd':clearInterval(histInt);go('histResolve');break;
    case a&&a.startsWith('histPick:'):S.hist.bestSel=+a.split(':')[1];render();break;
    case a==='histAward':{const i=S.hist&&S.hist.bestSel;if(i!=null)award([i],1);S.hist=null;nextRoundOrEnd();break;}
    case a==='histSkip':S.hist=null;nextRoundOrEnd();break;
    case a==='toProvavelResolve':go('provavelResolve');break;
    case a&&a.startsWith('provavelPick:'):S.round.provSel=+a.split(':')[1];render();break;
    case a==='provavelAward':{const i=S.round.provSel;if(i!=null)award([i],1);nextRoundOrEnd();break;}
    case a==='provavelSkip':nextRoundOrEnd();break;

    /* Duas Verdades e Uma Mentira */
    case a==='flipVerdades':{
      const c=$('#rcard');if(!c)break;const r=S.round;
      c.className='reveal-card shown cidade flip-in';
      c.innerHTML=`<div class="kicker">Sua mentira é a</div><div class="big cid" style="font-size:clamp(40px,14vw,56px);margin:8px 0">FRASE Nº ${r.liePos}</div><p class="muted" style="font-size:13px;max-width:280px">Conte 3 coisas sobre você, na ordem. A nº ${r.liePos} tem que ser a mentira. Ideia: ${esc(r.hint)}.</p><div style="margin-top:16px"><button class="btn btn-lime btn-sm" data-action="toVerdadesResolve">Memorizei — vou contar →</button></div>`;
      break;
    }
    case a==='reVerdades':S.round.teller=rnd(S.players.length);S.round.liePos=1+rnd(3);render();break;
    case a==='toVerdadesResolve':S.round.groupVote=null;go('verdadesResolve');break;
    case a&&a.startsWith('verdadesVote:'):S.round.groupVote=+a.split(':')[1];render();break;
    case a==='verdadesNext':{const r=S.round;
      if(r.groupVote===r.liePos){const others=S.players.map((_,i)=>i).filter(i=>i!==r.teller);award(others,1);}
      else award([r.teller],2);
      nextRoundOrEnd();break;}

    /* Quem Disse Isso? */
    case a==='quemdisseSubmit':quemdisseSubmit();break;
    case a&&a.startsWith('qdPick:'):S.round.qsel=+a.split(':')[1];render();break;
    case a==='qdAward':if(S.round.qsel!=null)go('quemdisseResult');break;
    case a==='qdNext':{const a2=S.round.shuffled[S.round.qsel];if(a2)award([a2.by],1);nextRoundOrEnd();break;}

    /* Palavra Proibida */
    case a==='flipProibida':{
      const c=$('#rcard');if(!c)break;const t=S.round.taboo;
      const forb=t.taboo.map(w=>`<span style="display:inline-block;background:rgba(255,59,92,.16);color:#ff8298;padding:4px 9px;border-radius:8px;margin:3px;font-size:13px;font-weight:600">${esc(w)}</span>`).join('');
      c.className='reveal-card shown cidade flip-in';
      c.innerHTML=`<div class="kicker">Faça adivinharem</div><div class="big cid" style="font-size:clamp(28px,9vw,38px);margin:8px 0">${esc(t.word)}</div><div class="kicker" style="color:var(--red);margin-top:6px">Não pode dizer</div><div style="margin:8px 0">${forb}</div><div style="margin-top:10px"><button class="btn btn-lime btn-sm" data-action="toDiscuss">Começar ⏱</button></div>`;
      break;
    }
    case a==='reProibida':S.round.clueGiver=rnd(S.players.length);render();break;

    /* Verdades Silenciosas */
    case a==='toSilenciosasResolve':go('silenciosasResolve');break;
    case a&&a.startsWith('silPick:'):S.round.silSel=+a.split(':')[1];render();break;
    case a==='silAward':{const i=S.round.silSel;if(i!=null)award([i],1);nextRoundOrEnd();break;}
    case a==='silSkip':nextRoundOrEnd();break;

    /* Momentos Quentes */
    case a==='toQuentesResolve':go('quentesResolve');break;
    case a&&a.startsWith('qtPick:'):S.round.qtSel=+a.split(':')[1];render();break;
    case a==='qtAward':{const i=S.round.qtSel;if(i!=null)award([i],1);nextRoundOrEnd();break;}
    case a==='qtSkip':nextRoundOrEnd();break;
    case a==='toDiscuss':S.round.timeLeft=S.discuss;S.round.endAt=Date.now()+S.discuss*1000;S.round.paused=false;go('discuss');break;
    case a==='timerToggle':{
      if(!S.round.paused){S.round.paused=true;S.round.timeLeft=Math.max(0,Math.ceil((S.round.endAt-Date.now())/1000));releaseWake();}
      else{S.round.paused=false;S.round.endAt=Date.now()+S.round.timeLeft*1000;requestWake();}
      const b=$('#ttg');if(b)b.textContent=S.round.paused?'▶ Continuar':'⏸ Pausar';break;
    }
    case a==='addTime':{
      S.round.timeLeft+=30;
      if(!S.round.paused)S.round.endAt+=30000;
      const el=$('#timer');if(el)el.textContent=fmt(S.round.timeLeft);break;
    }
    case a==='toResolve':clearInterval(timerInt);releaseWake();go('resolve');break;
    case a==='finishNoScore':nextRoundOrEnd();break;
    case a&&a.startsWith('regToggle:'):{
      const i=+a.split(':')[1];if(!S.round.regSel)S.round.regSel=[];
      const k=S.round.regSel.indexOf(i);if(k>=0)S.round.regSel.splice(k,1);else S.round.regSel.push(i);
      render();break;
    }
    case a==='regConfirm':{const sel=S.round.regSel||[];if(!sel.length)break;award(sel,1);nextRoundOrEnd();break;}
    case a&&a.startsWith('res:'):applyResolve(a);break;
    case a&&a.startsWith('debPick:'):S.round.debSel=+a.split(':')[1];render();break;
    case a==='debAward':{const i=S.round.debSel;if(i==null)break;award([i],1);nextRoundOrEnd();break;}
    case a&&a.startsWith('debSide:'):{const sp=S.round.debate.split;if(!sp)break;award(a.split(':')[1]==='a'?sp.a:sp.b,1);nextRoundOrEnd();break;}
    case a&&a.startsWith('mafCfg:'):{
      const [,k,d]=a.split(':');const m=S.maf;
      if(k==='mafia')m.mafiaCount=Math.max(1,m.mafiaCount+(+d));
      else if(k==='detective')m.detective=!m.detective;
      else if(k==='doctor')m.doctor=!m.doctor;
      render();break;
    }
    case a==='mafDealRoles':if(mafSetupValid())dealMafiaRoles();break;
    case a==='mafDealFlip':{
      const c=$('#rcard');if(!c)break;const m=S.maf,i=m.dealIdx,role=m.roles[i];
      const isMaf=role==='mafia';
      let inner;
      if(isMaf){
        const mates=S.players.map((p,k)=>k!==i&&m.roles[k]==='mafia'?esc(p.name):'').filter(Boolean);
        inner=`<div class="kicker" style="color:#bda4ff">Seu papel</div><div class="big" style="color:#bda4ff;font-size:clamp(26px,9vw,36px)">MÁFIA 🔪</div>
          <p class="muted" style="font-size:13.5px;max-width:300px">${mates.length?'Seus comparsas: <b style="color:#bda4ff">'+mates.join(', ')+'</b>. Combinem a vítima na calada.':'Você é a única Máfia. Aja sozinho.'}</p>`;
      } else {
        const meta={detective:['🔎','DETETIVE','#8ec0ff','Toda noite você investiga 1 pessoa e descobre se é da Máfia.'],
          doctor:['🩺','MÉDICO','var(--lime)','Toda noite você protege 1 pessoa (pode ser você) de morrer.'],
          cidadao:['🧑','CIDADÃO','var(--lime)','Sem poder especial. Use voto e dedução pra achar a Máfia.']}[role];
        inner=`<div class="kicker">Seu papel</div><div class="big" style="color:${meta[2]};font-size:clamp(24px,8vw,32px)">${meta[1]} ${meta[0]}</div>
          <p class="muted" style="font-size:13.5px;max-width:300px">${meta[3]}</p>`;
      }
      c.className='reveal-card shown '+(isMaf?'impostor':'cidade')+' flip-in';
      c.innerHTML=inner+'<div style="margin-top:18px"><button class="btn btn-ghost btn-sm" data-action="mafDealNext">Guardei — próximo →</button></div>';
      break;
    }
    case a==='mafDealNext':S.maf.dealIdx++;render();break;
    case a==='mafToNight':go('mafNight');break;
    case a==='mafStartTurns':{
      const m=S.maf;
      m.turnOrder=S.players.map((_,i)=>i).filter(i=>m.alive[i]);
      m.turnPos=0;m.turnRevealed=false;m.turnPick=null;m.mafiaPicks={};m.doctorSave=null;
      go('mafTurn');break;
    }
    case a==='mafTurnReveal':S.maf.turnRevealed=true;render();break;
    case a&&a.startsWith('mafPick:'):{
      S.maf.turnPick=+a.split(':')[1];render();break;
    }
    case a==='mafTurnNext':{
      const m=S.maf,cur=m.turnOrder[m.turnPos],role=m.roles[cur];
      if(role==='mafia'&&m.turnPick!=null)m.mafiaPicks[cur]=m.turnPick;
      else if(role==='doctor'&&m.turnPick!=null)m.doctorSave=m.turnPick;
      m.turnPos++;m.turnRevealed=false;m.turnPick=null;
      if(m.turnPos>=m.turnOrder.length){resolveNight();go('mafDay');}
      else render();
      break;
    }
    case a==='mafToVote':go('mafVote');break;
    case a&&a.startsWith('mafElim:'):{
      const m=S.maf,v=a.split(':')[1];
      if(v==='none'){m.eliminated=null;}
      else{const i=+v;m.alive[i]=false;m.eliminated=i;m.winner=checkWin();}
      go('mafVoteResult');break;
    }
    case a==='mafNextNight':{const m=S.maf;m.night++;m.eliminated=null;go('mafNight');break;}
    case a==='mafEnd':endMafia();break;
    case a==='mafContinue':S.maf=null;nextRoundOrEnd();break;
    case a==='newNight':resetNight();go('home');break;
    case a==='moreRounds':S.rounds+=3;S.currentRound++;S.game=null;S.round=null;go('play');break;
  }
});

document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&S.screen==='discuss'&&S.round&&!S.round.paused)requestWake();
});

function confetti(){
  const c=$('#conf');if(!c)return;
  const cols=['#ffcb45','#c6f24e','#ff3b5c','#8ec0ff','#fff'];
  for(let i=0;i<70;i++){
    const d=document.createElement('div');d.className='conf';
    d.style.left=Math.random()*100+'%';
    d.style.background=cols[rnd(cols.length)];
    d.style.animationDuration=(2+Math.random()*2.5)+'s';
    d.style.animationDelay=Math.random()*1.2+'s';
    d.style.transform='rotate('+rnd(360)+'deg)';
    c.appendChild(d);
  }
  setTimeout(()=>{if(c)c.innerHTML='';},5000);
}

load();
if(!S.seenIntro)S.screen='intro';
render();

/* PWA: service worker + prompt de instalação */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});});
}
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault(); deferredPrompt=e;
  if(S.screen==='home')render();
});
window.addEventListener('appinstalled',()=>{deferredPrompt=null;});
</script>
</body>
</html>
