<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Noite de Jogos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0e14; --surface:#16161f; --surface-2:#1e1e2b; --surface-3:#26263a;
    --text:#f4f1ea; --muted:#8c8ca0; --faint:#5c5c70;
    --lime:#c6f24e; --lime-d:#9fd02a;
    --red:#ff3b5c; --red-d:#d61f43;
    --gold:#ffcb45;
    --border:rgba(255,255,255,.09);
    --display:'Bricolage Grotesque',system-ui,sans-serif;
    --body:'Sora',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--text);font-family:var(--body);
    background-image:
      radial-gradient(circle at 15% -10%, rgba(198,242,78,.07), transparent 40%),
      radial-gradient(circle at 90% 110%, rgba(255,59,92,.08), transparent 45%);
    background-attachment:fixed;
    overflow-x:hidden;
  }
  #app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:0 18px 40px}
  /* top bar */
  .bar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;padding:16px 0 12px;background:linear-gradient(var(--bg) 70%,transparent);backdrop-filter:blur(4px)}
  .brand{font-family:var(--display);font-weight:800;font-size:20px;letter-spacing:-.02em;line-height:1;display:flex;align-items:center;gap:7px}
  .brand b{color:var(--lime)}
  .bar-meta{margin-left:auto;display:flex;gap:8px}
  .pill{font-size:12px;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:6px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;cursor:pointer;transition:.15s}
  .pill:active{transform:scale(.94)}
  .pill b{color:var(--text)}
  /* generic */
  h1{font-family:var(--display);font-weight:800;letter-spacing:-.03em;line-height:.95}
  .screen{animation:rise .35s cubic-bezier(.2,.8,.2,1) both;flex:1}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .stagger>*{animation:rise .4s cubic-bezier(.2,.8,.2,1) both}
  .stagger>*:nth-child(1){animation-delay:.02s}.stagger>*:nth-child(2){animation-delay:.07s}
  .stagger>*:nth-child(3){animation-delay:.12s}.stagger>*:nth-child(4){animation-delay:.17s}
  .stagger>*:nth-child(5){animation-delay:.22s}.stagger>*:nth-child(6){animation-delay:.27s}
  .muted{color:var(--muted)}.faint{color:var(--faint)}
  .center{text-align:center}
  .row{display:flex;gap:10px;align-items:center}
  .grow{flex:1}
  /* buttons */
  .btn{font-family:var(--body);font-weight:700;font-size:16px;border:none;border-radius:16px;padding:16px 18px;width:100%;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:9px;line-height:1}
  .btn:active{transform:scale(.97)}
  .btn-lime{background:var(--lime);color:#10100a}
  .btn-red{background:var(--red);color:#fff}
  .btn-ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
  .btn-gold{background:var(--gold);color:#241c00}
  .btn-lg{padding:20px;font-size:18px;border-radius:20px}
  .btn-sm{padding:11px 14px;font-size:14px;border-radius:12px;width:auto}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  /* cards */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:18px}
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px;text-align:left;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .tile:active{transform:scale(.97)}
  .tile.disabled{opacity:.38;pointer-events:none}
  .tile .emoji{font-size:26px;line-height:1}
  .tile .tname{font-family:var(--display);font-weight:700;font-size:17px;margin-top:8px;letter-spacing:-.02em}
  .tile .tdesc{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.35}
  .tag{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 7px;border-radius:7px;margin-top:10px}
  .tag.imp{background:rgba(255,59,92,.16);color:#ff8298}
  .tag.reg{background:rgba(198,242,78,.16);color:var(--lime)}
  .tag.esc{background:rgba(120,180,255,.16);color:#8ec0ff}
  .tag.deb{background:rgba(255,203,69,.16);color:var(--gold)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  /* chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-size:13px;font-weight:600;padding:9px 13px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:.15s}
  .chip:active{transform:scale(.95)}
  .chip.on{background:var(--lime);color:#10100a;border-color:var(--lime)}
  /* stepper */
  .stepper{display:flex;align-items:center;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .stepper button{width:46px;height:46px;background:none;border:none;color:var(--text);font-size:22px;font-weight:700;cursor:pointer}
  .stepper button:active{background:var(--surface-3)}
  .stepper .val{flex:1;text-align:center;font-family:var(--display);font-weight:700;font-size:20px;min-width:54px}
  /* players */
  .pinput{display:flex;gap:8px;margin-bottom:14px}
  .pinput input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;color:var(--text);font-family:var(--body);font-size:16px;outline:none}
  .pinput input:focus{border-color:var(--lime)}
  .plist{display:flex;flex-direction:column;gap:8px}
  .prow{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px}
  .pnum{width:26px;height:26px;border-radius:50%;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted);flex:0 0 auto}
  .prow .pn{font-weight:600;flex:1}
  .xbtn{background:none;border:none;color:var(--faint);font-size:20px;cursor:pointer;padding:4px 6px;line-height:1}
  .xbtn:active{color:var(--red)}
  /* reveal pass card */
  .pass{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;padding:30px 16px}
  .reveal-card{width:100%;border-radius:24px;padding:34px 22px;min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;border:1px solid var(--border);transition:.2s;position:relative}
  .reveal-card.hidden{background:var(--surface-2)}
  .reveal-card.shown.cidade{background:linear-gradient(160deg,#1a2410,#0e0e14);border-color:var(--lime)}
  .reveal-card.shown.impostor{background:linear-gradient(160deg,#2a0f17,#0e0e14);border-color:var(--red)}
  .reveal-card .big{font-family:var(--display);font-weight:800;font-size:40px;letter-spacing:-.03em;line-height:1.02;margin:6px 0}
  .reveal-card .big.imp{color:var(--red)}
  .reveal-card .big.cid{color:var(--lime)}
  .flip-in{animation:flip .35s ease both}
  @keyframes flip{from{opacity:0;transform:rotateX(40deg) scale(.95)}to{opacity:1;transform:none}}
  .kicker{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  /* timer */
  .timer-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin:26px 0}
  .timer{font-family:var(--display);font-weight:800;font-size:88px;letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums}
  .timer.warn{color:var(--red);animation:pulse .6s infinite alternate}
  @keyframes pulse{to{transform:scale(1.06)}}
  .ring{width:200px;height:200px}
  /* scoreboard */
  .srow{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:9px;transition:.3s}
  .srow .rank{font-family:var(--display);font-weight:800;font-size:22px;width:30px;color:var(--faint)}
  .srow.top1{border-color:var(--gold);background:linear-gradient(120deg,rgba(255,203,69,.1),var(--surface))}
  .srow.top1 .rank{color:var(--gold)}
  .srow .sn{flex:1;font-weight:600;font-size:16px}
  .srow .sp{font-family:var(--display);font-weight:800;font-size:24px}
  .lead{font-size:15px;line-height:1.55;color:var(--muted)}
  .sec-label{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:24px 0 11px}
  .note{font-size:13px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--lime);border-radius:10px;padding:11px 13px;line-height:1.5}
  .note.imp{border-left-color:var(--red)}
  .spacer{height:14px}
  .big-emoji{font-size:54px;line-height:1}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:50}
  .conf{position:absolute;width:9px;height:14px;top:-20px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.8}}
  a.creditless{color:var(--faint);font-size:11px;text-decoration:none}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* =========================================================

const THEMES = {

const GAMES = [
  // ---- IMPOSTOR ----
  {id:'palavra', fam:'imp', emoji:'😶', name:'Palavra Oculta', min:3, max:14, theme:true,
   desc:'Todos sabem a palavra. Um não. Achem o impostor.',
   rules:'Todos os jogadores recebem a MESMA palavra secreta, menos o impostor, que não recebe nada. Cada um, na sua vez, fala UMA palavra relacionada ao tema sem entregar a palavra exata. O impostor blefa tentando se misturar. No fim, todos discutem e votam em quem acham que é o impostor.'},
  {id:'invertida', fam:'imp', emoji:'🔄', name:'Pergunta Invertida', min:3, max:12, theme:false,
   desc:'Mesma pergunta pra todos. O impostor recebe outra parecida.',
   rules:'A maioria recebe uma pergunta. O impostor recebe uma pergunta PARECIDA, mas diferente. Todos respondem em voz alta como se fosse a mesma pergunta. A resposta do impostor vai soar levemente fora de contexto. Discutam e votem.'},
  {id:'coordenada', fam:'imp', emoji:'🎯', name:'Coordenada Errada', min:3, max:12, theme:true,
   desc:'Todos veem a mesma lista. Um recebe o número errado.',
   rules:'Todos veem a mesma lista de 6 itens numerados. A cidade recebe o MESMO número secreto; o impostor recebe um número DIFERENTE. Cada um fala uma palavra ligada ao SEU item. Quem estiver no item errado vai se entregar. Discutam e votem.'},

   desc:'Todos recebem o mesmo personagem. O impostor, nada.',
   rules:'Todos recebem o mesmo personagem/coisa secreta. O impostor não recebe e precisa fingir que recebeu. Cada um dá uma pista sutil sobre o personagem. O impostor improvisa em cima do que os outros disseram. Votem no impostor.'},
  {id:'duplo', fam:'imp', emoji:'🕵️', name:'Duplo Impostor', min:5, max:16, theme:true, impostors:2,
   desc:'Como Palavra Oculta, mas com DOIS impostores que não se conhecem.',
   rules:'Igual à Palavra Oculta, mas existem DOIS impostores, e eles não sabem quem é o outro. Eles podem até se acusar pra desviar a atenção. A cidade precisa achar os dois. Caos garantido.'},
  // ---- REGRA (só anfitrião) ----
  {id:'banquete', fam:'reg', emoji:'👑', name:'O Banquete do Rei', min:3, max:12,

const FAM_TAG = {imp:['imp','Impostor'], reg:['reg','Qual é a regra'], esc:['esc','Sintonia'], deb:['deb','Debate']};

/* =========================================================
   ESTADO
========================================================= */
let S = {
  screen:'home',
  players:[],
  theme:'geral',
  rounds:5,
  discuss:120,
  currentRound:1,
  game:null,
  round:null, // runtime
};

/* =========================================================
   HELPERS
========================================================= */
const $=(s)=>document.querySelector(s);
const app=$('#app');
const rnd=(n)=>Math.floor(Math.random()*n);
const shuffle=(a)=>{a=[...a];for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;};
const esc=(s)=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function playable(g){return S.players.length>=g.min && S.players.length<=g.max;}
function fmt(t){const m=Math.floor(t/60),s=t%60;return m+':'+String(s).padStart(2,'0');}

function go(scr){S.screen=scr;render();window.scrollTo(0,0);}

/* =========================================================
   MONTAGEM DE RODADA
========================================================= */
function startGame(g){
  S.game=g;
  go('briefing');
}

function buildRound(){
  const g=S.game, P=S.players, n=P.length;
  const items=THEMES[S.theme].items;
  let r={revealIdx:0};

  if(g.fam==='imp'){
    const nImp=g.impostors||1;
    const impSet=shuffle([...Array(n).keys()]).slice(0,nImp);
    r.impostors=impSet;
    r.cards=[];
    if(g.id==='palavra'||g.id==='duplo'){
      const word=items[rnd(items.length)];
      r.secretWord=word;
      for(let i=0;i<n;i++){
        r.cards.push(impSet.includes(i)
          ? {type:'imp', big:'VOCÊ É O<br>IMPOSTOR', sub:'Descubra a palavra secreta sem se entregar.'}
          : {type:'cid', kicker:'A palavra é', big:word, sub:'Dê uma pista sutil. Não entregue a palavra.'});
      }
    } else if(g.id==='personagem'){
      const word=items[rnd(items.length)];
      r.secretWord=word;
      for(let i=0;i<n;i++){
        r.cards.push(impSet.includes(i)
          ? {type:'imp', big:'VOCÊ É O<br>IMPOSTOR', sub:'Você NÃO recebeu personagem. Finja que recebeu.'}
          : {type:'cid', kicker:'Seu personagem', big:word, sub:'Dê pistas sutis sobre ele.'});
      }
    } else if(g.id==='invertida'){
      const pair=QPAIRS[rnd(QPAIRS.length)];
      r.pair=pair;
      for(let i=0;i<n;i++){
        r.cards.push(impSet.includes(i)
          ? {type:'cid', kicker:'Sua pergunta', big:'❓', q:pair[1], sub:'Responda em voz alta na sua vez.'}
          : {type:'cid', kicker:'Sua pergunta', big:'❓', q:pair[0], sub:'Responda em voz alta na sua vez.'});
      }
    } else if(g.id==='coordenada'){
      const list=shuffle(items).slice(0,6);
      r.list=list;
      const realN=1+rnd(6);
      let impN; do{impN=1+rnd(6);}while(impN===realN);
      r.realN=realN; r.impN=impN;
      for(let i=0;i<n;i++){
        const num=impSet.includes(i)?impN:realN;
        r.cards.push({type:'cid', list, num,
          kicker:'Seu número secreto', big:String(num),
          sub:'Fale uma palavra ligada ao item número '+num+'.'});
      }
    }
  }
  else if(g.fam==='reg'){
    // anfitrião sorteado
    r.host=rnd(n);
    r.secret=g.secret;
  }
  else if(g.id==='escala'){
    const prompt=SCALE_PROMPTS[rnd(SCALE_PROMPTS.length)];
    r.prompt=prompt;
    const nums=shuffle([...Array(10).keys()].map(x=>x+1)).slice(0,n);
    r.cards=nums.map((num)=>({type:'cid',kicker:prompt,big:String(num),sub:'Dê um exemplo dessa intensidade — sem dizer o número.'}));
  }
  else if(g.id==='pistas'){
    r.clueGiver=rnd(n);
    r.concept=items[rnd(items.length)];
  }
  else if(g.id==='botao'){
    r.scenario=BOTAO[rnd(BOTAO.length)];
  }
  S.round=r;
}

function tickStart(){
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    if(S.screen!=='discuss'){clearInterval(timerInt);return;}
    if(S.round.paused)return;
    S.round.timeLeft--;
    const el=$('#timer');
    if(el){el.textContent=fmt(Math.max(0,S.round.timeLeft));el.classList.toggle('warn',S.round.timeLeft<=15);}
    if(S.round.timeLeft<=0){clearInterval(timerInt);if(navigator.vibrate)navigator.vibrate([200,100,200]);}
  },1000);
}

function render(){
  let html='';
  switch(S.screen){
    case 'home':html=viewHome();break;
    case 'players':html=viewPlayers();break;
    case 'config':html=viewConfig();break;
    case 'play':html=viewPlay();break;
    case 'briefing':html=viewBriefing();break;
    case 'reveal':html=viewReveal();break;
    case 'hostReveal':html=viewHostReveal();break;
    case 'clueReveal':html=viewClueReveal();break;
    case 'botao':html=viewBotao();break;
    case 'discuss':html=viewDiscuss();break;
    case 'resolve':html=viewResolve();break;
    case 'scoreboard':html=viewScoreboard('play');break;
    case 'champion':html=viewChampion();break;
  }
  app.innerHTML=html;
  if(S.screen==='discuss')tickStart();
  if(S.screen==='players'){const inp=$('#pname');if(inp){inp.focus();inp.onkeydown=e=>{if(e.key==='Enter')addPlayer();};}}
  if(S.screen==='champion')confetti();
}

========================================================= */
function addPlayer(){
  const inp=$('#pname');if(!inp)return;
  const name=inp.value.trim();
  if(!name)return;
  S.players.push({name,score:0});
  render();
}

function setupRound(){
  buildRound();
  const g=S.game;
  if(g.fam==='imp'||g.id==='escala')go('reveal');
  else if(g.fam==='reg')go('hostReveal');
  else if(g.id==='pistas')go('clueReveal');
  else if(g.id==='botao')go('botao');
}

function applyResolve(action){
  const g=S.game,r=S.round;
  const parts=action.split(':');
  if(g.fam==='imp'){
    if(parts[1]==='cidade'){const inn=S.players.map((_,i)=>i).filter(i=>!r.impostors.includes(i));award(inn,1);}
    else{award(r.impostors,2);}
  } else if(g.fam==='reg'){
    if(parts[2]==='host')award([r.host],2);
    else award([+parts[2]],1);
  } else if(g.id==='escala'){
    if(parts[2]==='1')award(S.players.map((_,i)=>i),1);
  } else if(g.id==='pistas'){
    if(parts[2]!=='none'){award([+parts[2],r.clueGiver],1);}
  }
  nextRoundOrEnd();
}

document.addEventListener('click',(e)=>{
  const t=e.target.closest('[data-action],[data-go],[data-game],[data-rm],[data-theme],[data-step]');
  if(!t)return;

  if(t.dataset.go){go(t.dataset.go);return;}
  if(t.dataset.rm!==undefined){S.players.splice(+t.dataset.rm,1);render();return;}
  if(t.dataset.theme){S.theme=t.dataset.theme;render();return;}
  if(t.dataset.step){
    const [k,d]=t.dataset.step.split(':');const dv=+d;
    if(k==='rounds')S.rounds=Math.max(1,Math.min(30,S.rounds+dv));
    if(k==='discuss')S.discuss=Math.max(30,Math.min(600,S.discuss+dv));
    render();return;
  }
  if(t.dataset.game){
    const g=GAMES.find(x=>x.id===t.dataset.game);
    if(g&&playable(g))startGame(g);
    return;
  }

  const a=t.dataset.action;
  switch(true){
    case a==='toPlay':go(S.players.length>=2?'play':'players');break;
    case a==='addP':addPlayer();break;
    case a==='sortear':{
      const pool=GAMES.filter(playable);
      if(!pool.length)return;
      startGame(pool[rnd(pool.length)]);
      break;
    }
    case a==='setupRound':setupRound();break;
    case a==='flip':{
      const c=$('#rcard');const card=S.round.cards[S.round.revealIdx];
      if(c.classList.contains('hidden')){
        c.className='reveal-card shown '+(card.type==='imp'?'impostor':'cidade')+' flip-in';
        c.innerHTML=cardInner(card)+'<div style="margin-top:18px"><button class="btn btn-ghost btn-sm" data-action="nextReveal">Já vi — próximo →</button></div>';
      }
      break;
    }
    case a==='nextReveal':S.round.revealIdx++;render();break;
    case a==='flipHost':{
      const c=$('#rcard');
      c.className='reveal-card shown cidade flip-in';
      c.innerHTML=`<div class="kicker">Regra secreta</div><p style="font-size:16px;line-height:1.55;margin-top:12px">${S.game.secret}</p><div style="margin-top:18px"><button class="btn btn-lime btn-sm" data-action="toDiscuss">Entendi — começar ⏱</button></div>`;
      break;
    }
    case a==='reHost':S.round.host=rnd(S.players.length);render();break;
    case a==='flipClue':{
      const c=$('#rcard');
      c.className='reveal-card shown cidade flip-in';
      c.innerHTML=`<div class="kicker">Conceito secreto</div><div class="big cid" style="font-size:34px;margin:12px 0">${esc(S.round.concept)}</div><p class="muted" style="font-size:13px">Dê 3 pistas, uma de cada vez.</p><div style="margin-top:16px"><button class="btn btn-lime btn-sm" data-action="toDiscuss">Começar ⏱</button></div>`;
      break;
    }
    case a==='reClue':S.round.clueGiver=rnd(S.players.length);render();break;
    case a==='toDiscuss':S.round.timeLeft=S.discuss;S.round.paused=false;go('discuss');break;
    case a==='timerToggle':S.round.paused=!S.round.paused;$('#ttg').textContent=S.round.paused?'▶ Continuar':'⏸ Pausar';break;
    case a==='addTime':S.round.timeLeft+=30;$('#timer').textContent=fmt(S.round.timeLeft);break;
    case a==='toResolve':clearInterval(timerInt);go('resolve');break;
    case a==='finishNoScore':nextRoundOrEnd();break;
    case a&&a.startsWith('regToggle:'):{
      const i=+a.split(':')[1];
      if(!S.round.regSel)S.round.regSel=[];
      const k=S.round.regSel.indexOf(i);
      if(k>=0)S.round.regSel.splice(k,1);else S.round.regSel.push(i);
      render();break;
    }
    case a==='regConfirm':{
      const sel=S.round.regSel||[];
      if(!sel.length)break;
      award(sel,1);
      nextRoundOrEnd();break;
    }
    case a&&a.startsWith('res:'):applyResolve(a);break;
    case a==='newNight':S.players.forEach(p=>p.score=0);S.currentRound=1;S.game=null;S.round=null;go('home');break;
    case a==='moreRounds':S.rounds+=3;S.currentRound++;S.game=null;S.round=null;go('play');break;
  }
});

function confetti(){
  const c=$('#conf');if(!c)return;
  const cols=['#ffcb45','#c6f24e','#ff3b5c','#8ec0ff','#fff'];
  for(let i=0;i<70;i++){
    const d=document.createElement('div');d.className='conf';
    d.style.left=Math.random()*100+'%';
    d.style.background=cols[rnd(cols.length)];
    d.style.animationDuration=(2+Math.random()*2.5)+'s';
    d.style.animationDelay=Math.random()*1.2+'s';
    d.style.transform='rotate('+rnd(360)+'deg)';
    c.appendChild(d);
  }
  setTimeout(()=>{if(c)c.innerHTML='';},5000);
}

render();
</script>
