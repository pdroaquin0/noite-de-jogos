<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0e14; --surface:#16161f; --surface-2:#1e1e2b; --surface-3:#26263a;
    --text:#f4f1ea; --muted:#8c8ca0; --faint:#5c5c70;
    --lime:#c6f24e; --lime-d:#9fd02a;
    --red:#ff3b5c; --red-d:#d61f43;
    --gold:#ffcb45;
    --border:rgba(255,255,255,.09);
    --display:'Bricolage Grotesque',system-ui,sans-serif;
    --body:'Sora',system-ui,sans-serif;
    --pad:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%;height:100%}
  body{
    min-height:100%;background:var(--bg);color:var(--text);font-family:var(--body);
    background-image:
      radial-gradient(circle at 15% -10%, rgba(198,242,78,.07), transparent 40%),
      radial-gradient(circle at 90% 110%, rgba(255,59,92,.08), transparent 45%);
    background-attachment:fixed;overflow-x:hidden;
  }
  #app{
    max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
    padding:0 max(var(--pad),env(safe-area-inset-left)) calc(40px + env(safe-area-inset-bottom)) max(var(--pad),env(safe-area-inset-right));
  }
  .bar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;
    padding:calc(14px + env(safe-area-inset-top)) 0 12px;background:linear-gradient(var(--bg) 72%,transparent);backdrop-filter:blur(4px)}
  .brand{font-family:var(--display);font-weight:800;font-size:clamp(17px,5vw,20px);letter-spacing:-.02em;line-height:1;display:flex;align-items:center;gap:6px;min-width:0}
  .brand span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand b{color:var(--lime)}
  .bar-meta{margin-left:auto;display:flex;gap:7px;flex:0 0 auto}
  .pill{font-size:12px;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:7px 11px;border-radius:20px;display:flex;align-items:center;gap:5px;cursor:pointer;transition:.15s;white-space:nowrap}
  .pill:active{transform:scale(.94)}
  .pill b{color:var(--text)}
  h1{font-family:var(--display);font-weight:800;letter-spacing:-.03em;line-height:.95}
  .screen{animation:rise .35s cubic-bezier(.2,.8,.2,1) both;flex:1;display:flex;flex-direction:column}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .stagger>*{animation:rise .4s cubic-bezier(.2,.8,.2,1) both}
  .stagger>*:nth-child(1){animation-delay:.02s}.stagger>*:nth-child(2){animation-delay:.07s}
  .stagger>*:nth-child(3){animation-delay:.12s}.stagger>*:nth-child(4){animation-delay:.17s}
  .stagger>*:nth-child(5){animation-delay:.22s}.stagger>*:nth-child(6){animation-delay:.27s}
  .muted{color:var(--muted)}.faint{color:var(--faint)}
  .center{text-align:center}
  .row{display:flex;gap:10px;align-items:center}
  .grow{flex:1;min-width:0}
  .btn{font-family:var(--body);font-weight:700;font-size:16px;border:none;border-radius:16px;padding:16px 18px;width:100%;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:9px;line-height:1.15;text-align:center}
  .btn:active{transform:scale(.97)}
  .btn-lime{background:var(--lime);color:#10100a}
  .btn-red{background:var(--red);color:#fff}
  .btn-ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
  .btn-gold{background:var(--gold);color:#241c00}
  .btn-lg{padding:19px;font-size:17px;border-radius:20px}
  .btn-sm{padding:11px 14px;font-size:14px;border-radius:12px;width:auto}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:18px}
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:15px;text-align:left;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .tile:active{transform:scale(.97)}
  .tile.disabled{opacity:.36;pointer-events:none}
  .tile .emoji{font-size:25px;line-height:1}
  .tile .tname{font-family:var(--display);font-weight:700;font-size:16px;margin-top:7px;letter-spacing:-.02em;line-height:1.05}
  .tile .tdesc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.32}
  .tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 7px;border-radius:7px;margin-top:9px}
  .tag.imp{background:rgba(255,59,92,.16);color:#ff8298}
  .tag.reg{background:rgba(198,242,78,.16);color:var(--lime)}
  .tag.esc{background:rgba(120,180,255,.16);color:#8ec0ff}
  .tag.deb{background:rgba(255,203,69,.16);color:var(--gold)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-size:13px;font-weight:600;padding:9px 12px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:.15s}
  .chip:active{transform:scale(.95)}
  .chip.on{background:var(--lime);color:#10100a;border-color:var(--lime)}
  .chip.rm{padding-right:9px}
  .stepper{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .stepper button{width:48px;height:48px;background:none;border:none;color:var(--text);font-size:24px;font-weight:700;cursor:pointer;flex:0 0 auto}
  .stepper button:active{background:var(--surface-3)}
  .stepper .val{flex:1;text-align:center;font-family:var(--display);font-weight:700;font-size:20px;min-width:54px}
  .pinput{display:flex;gap:8px;margin-bottom:14px}
  .pinput input{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 15px;color:var(--text);font-family:var(--body);font-size:16px;outline:none}
  .pinput input:focus{border-color:var(--lime)}
  .plist{display:flex;flex-direction:column;gap:8px}
  .prow{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px}
  .pnum{width:26px;height:26px;border-radius:50%;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted);flex:0 0 auto}
  .prow .pn{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .xbtn{background:none;border:none;color:var(--faint);font-size:20px;cursor:pointer;padding:4px 6px;line-height:1;flex:0 0 auto}
  .xbtn:active{color:var(--red)}
  .pass{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;padding:24px 4px;flex:1}
  .reveal-card{width:100%;border-radius:24px;padding:30px 20px;min-height:270px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;border:1px solid var(--border);transition:.2s;position:relative}
  .reveal-card.hidden{background:var(--surface-2)}
  .reveal-card.shown.cidade{background:linear-gradient(160deg,#1a2410,#0e0e14);border-color:var(--lime)}
  .reveal-card.shown.impostor{background:linear-gradient(160deg,#2a0f17,#0e0e14);border-color:var(--red)}
  .reveal-card .big{font-family:var(--display);font-weight:800;font-size:clamp(30px,9vw,42px);letter-spacing:-.03em;line-height:1.02;margin:6px 0;word-break:break-word;hyphens:auto}
  .reveal-card .big.imp{color:var(--red)}
  .reveal-card .big.cid{color:var(--lime)}
  .flip-in{animation:flip .35s ease both}
  @keyframes flip{from{opacity:0;transform:rotateX(40deg) scale(.95)}to{opacity:1;transform:none}}
  .kicker{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .timer-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin:22px 0}
  .timer{font-family:var(--display);font-weight:800;font-size:clamp(64px,24vw,96px);letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums}
  .timer.warn{color:var(--red);animation:pulse .6s infinite alternate}
  @keyframes pulse{to{transform:scale(1.06)}}
  .srow{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:9px;transition:.3s}
  .srow .rank{font-family:var(--display);font-weight:800;font-size:22px;width:34px;text-align:center;color:var(--faint);flex:0 0 auto}
  .srow.top1{border-color:var(--gold);background:linear-gradient(120deg,rgba(255,203,69,.1),var(--surface))}
  .srow.top1 .rank{color:var(--gold)}
  .srow .sn{flex:1;min-width:0;font-weight:600;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .srow .sp{font-family:var(--display);font-weight:800;font-size:24px;flex:0 0 auto}
  .lead{font-size:15px;line-height:1.55;color:var(--muted)}
  .sec-label{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:22px 0 11px}
  .note{font-size:13px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--lime);border-radius:10px;padding:11px 13px;line-height:1.5}
  .note.imp{border-left-color:var(--red)}
  .spacer{height:14px}
  .big-emoji{font-size:clamp(48px,15vw,58px);line-height:1}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:50}
  .conf{position:absolute;width:9px;height:14px;top:-20px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.8}}
  .resume{background:linear-gradient(120deg,rgba(255,203,69,.12),var(--surface));border:1px solid rgba(255,203,69,.4)}
  @media (max-width:360px){:root{--pad:13px}.tile .tname{font-size:15px}.btn{font-size:15px}}
  @media (min-width:560px){.reveal-card{min-height:300px}}
</style>
</head>

function save(){

function load(){
  try{

    if(!raw)return;
    const d=JSON.parse(raw);
    if(d&&typeof d==='object'){
      S.players=Array.isArray(d.players)?d.players:[];
      S.theme=d.theme||'geral';
      S.rounds=d.rounds||5; S.discuss=d.discuss||120;
      S.currentRound=d.currentRound||1;
      S.customWords=Array.isArray(d.customWords)?d.customWords:[];

}

const $=(s)=>document.querySelector(s);
const app=$('#app');
const rnd=(n)=>Math.floor(Math.random()*n);
const shuffle=(a)=>{a=[...a];for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;};
const esc=(s)=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function playable(g){return S.players.length>=g.min && S.players.length<=g.max;}
function fmt(t){t=Math.max(0,t);const m=Math.floor(t/60),s=t%60;return m+':'+String(s).padStart(2,'0');}
function themeItems(){
  const it = S.theme==='custom' ? S.customWords : (THEMES[S.theme]?THEMES[S.theme].items:null);
  return (it&&it.length) ? it : THEMES.geral.items;
}
function themeLabel(){
  if(S.theme==='custom') return 'Meu tema ✏️';
  return THEMES[S.theme] ? THEMES[S.theme].label : 'Geral 🎲';
}
function pickWord(items){
  let w,t=0;
  do{w=items[rnd(items.length)];t++;}while(w===S.lastWord && items.length>1 && t<8);
  S.lastWord=w; return w;
}
function go(scr){S.screen=scr;render();window.scrollTo(0,0);}

/* =========================================================
   MONTAGEM DE RODADA
========================================================= */
function startGame(g){S.game=g;S.lastGameId=g.id;go('briefing');}

function buildRound(){
  const g=S.game, P=S.players, n=P.length;
  const items=themeItems();
  let r={revealIdx:0};

  if(g.fam==='imp'){
    const nImp=g.impostors||1;
    const impSet=shuffle([...Array(n).keys()]).slice(0,nImp);
    r.impostors=impSet; r.cards=[];
    if(g.id==='palavra'||g.id==='duplo'){
      const word=pickWord(items); r.secretWord=word;
      for(let i=0;i<n;i++){
        r.cards.push(impSet.includes(i)
          ? {type:'imp', big:'VOCÊ É O<br>IMPOSTOR', sub:'Descubra a palavra secreta sem se entregar.'}
          : {type:'cid', kicker:'A palavra é', big:word, sub:'Dê uma pista sutil. Não entregue a palavra.'});
      }
    } else if(g.id==='personagem'){
      const word=pickWord(items); r.secretWord=word;
      for(let i=0;i<n;i++){
        r.cards.push(impSet.includes(i)
          ? {type:'imp', big:'VOCÊ É O<br>IMPOSTOR', sub:'Você NÃO recebeu personagem. Finja que recebeu.'}
          : {type:'cid', kicker:'Seu personagem', big:word, sub:'Dê pistas sutis sobre ele.'});
      }
    } else if(g.id==='invertida'){
      const pair=QPAIRS[rnd(QPAIRS.length)]; r.pair=pair;
      for(let i=0;i<n;i++){
        r.cards.push({type:'cid', kicker:'Sua pergunta', big:'❓',
          q: impSet.includes(i)?pair[1]:pair[0], sub:'Responda em voz alta na sua vez.'});
      }
    } else if(g.id==='coordenada'){
      const k=Math.min(6, Math.max(2, items.length));
      const list=shuffle(items).slice(0,k); r.list=list;
      const realN=1+rnd(k); let impN; do{impN=1+rnd(k);}while(impN===realN&&k>1);
      r.realN=realN; r.impN=impN;
      for(let i=0;i<n;i++){
        const num=impSet.includes(i)?impN:realN;
        r.cards.push({type:'cid', list, num, kicker:'Seu número secreto', big:String(num),
          sub:'Fale uma palavra ligada ao item número '+num+'.'});
      }
    }
  }
  else if(g.fam==='reg'){ r.host=rnd(n); r.secret=g.secret; }
  else if(g.id==='escala'){
    const prompt=SCALE_PROMPTS[rnd(SCALE_PROMPTS.length)]; r.prompt=prompt;
    const nums=shuffle([...Array(10).keys()].map(x=>x+1)).slice(0,n);
    r.cards=nums.map((num)=>({type:'cid',kicker:prompt,big:String(num),sub:'Dê um exemplo dessa intensidade — sem dizer o número.'}));
  }
  else if(g.id==='pistas'){ r.clueGiver=rnd(n); r.concept=pickWord(items); }
  else if(g.id==='botao'){ r.debate={head:'Aperta ou não?',text:BOTAO[rnd(BOTAO.length)]}; }
  else if(g.id==='opiniao'){ r.debate={head:'Concorda ou discorda?',text:OPINIOES[rnd(OPINIOES.length)]}; }
  S.round=r;
}

function nextRoundOrEnd(){
  if(S.currentRound>=S.rounds){go('champion');}
  else{S.currentRound++;S.game=null;S.round=null;go('play');}
}

    <div class="spacer"></div>
    <button class="btn btn-lime btn-lg" data-action="setupRound">Preparar rodada →</button>
    <div style="height:9px"></div>
    <button class="btn btn-ghost" data-go="play">← Trocar de jogo</button>
  </div>`;
}

function viewReveal(){
  const g=S.game,r=S.round,i=r.revealIdx,P=S.players;
  if(i>=P.length){
    return `${bar()}<div class="screen pass">
      <div class="big-emoji">✅</div>
      <h1 style="font-size:clamp(24px,8vw,30px)" class="center">Todos viram!</h1>
      <p class="muted center">Agora discutam. ${g.fam==='imp'?'Achem o impostor.':'Ordenem o grupo.'}</p>
      <button class="btn btn-red btn-lg" data-action="toDiscuss" style="width:100%">Iniciar discussão ⏱</button>
    </div>`;
  }
  return `${bar()}<div class="screen pass">
    <div class="kicker">Jogador ${i+1} de ${P.length}</div>
    <h1 style="font-size:clamp(30px,10vw,38px)">${esc(P[i].name)}</h1>
    <p class="muted">Pegue o celular. Toque para ver seu segredo — não deixe ninguém olhar.</p>
    <div class="reveal-card hidden" id="rcard" data-action="flip">
      <div class="big-emoji">👁️</div>
      <div style="margin-top:10px;font-weight:700">Toque para revelar</div>
    </div>
  </div>`;
}
function cardInner(card){
  if(card.q!==undefined){
    return `<div class="kicker">${card.kicker||''}</div>
      <div class="big" style="font-size:clamp(22px,7vw,30px);margin:14px 4px">${esc(card.q)}</div>
      <p class="muted" style="font-size:13px">${card.sub||''}</p>`;
  }
  let listHtml='';
  if(card.list){
    listHtml=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;margin:14px 0;width:100%">`+
      card.list.map((it,k)=>`<div style="font-size:14px;${(k+1)==card.num?'color:var(--lime);font-weight:700':'color:var(--muted)'}">${k+1}. ${esc(it)}</div>`).join('')+`</div>`;
  }
  const bigCls=card.type==='imp'?'imp':'cid';
  return `<div class="kicker">${card.kicker||''}</div>
    <div class="big ${bigCls}">${card.big}</div>
    ${listHtml}
    <p class="muted" style="font-size:13.5px;max-width:300px">${card.sub||''}</p>`;
}

function viewHostReveal(){
  const r=S.round,host=S.players[r.host];
  return `${bar()}<div class="screen pass">
    <div class="kicker">Anfitrião sorteado</div>
    <h1 style="font-size:clamp(30px,11vw,40px)">${esc(host.name)}</h1>
    <p class="muted">${esc(host.name)}, pegue o celular. Só você pode ver a regra.</p>
    <div class="reveal-card hidden" id="rcard" data-action="flipHost">
      <div class="big-emoji">🤫</div>
      <div style="margin-top:10px;font-weight:700">Toque para ver a regra</div>
    </div>
    <button class="btn btn-ghost btn-sm" data-action="reHost">🎲 Sortear outro anfitrião</button>
  </div>`;
}

function viewClueReveal(){
  const r=S.round,cg=S.players[r.clueGiver];
  return `${bar()}<div class="screen pass">
    <div class="kicker">Quem dá as pistas</div>
    <h1 style="font-size:clamp(28px,10vw,38px)">${esc(cg.name)}</h1>
    <p class="muted">Só ${esc(cg.name)} vê o conceito. Dê 3 palavras como pista, uma de cada vez.</p>
    <div class="reveal-card hidden" id="rcard" data-action="flipClue">
      <div class="big-emoji">🧩</div>
      <div style="margin-top:10px;font-weight:700">Toque para ver o conceito</div>
    </div>
    <button class="btn btn-ghost btn-sm" data-action="reClue">🎲 Outro jogador</button>
  </div>`;
}

function viewDebate(){
  const d=S.round.debate;
  return `${bar()}<div class="screen stagger">
    <div class="center" style="margin:16px 0"><div class="big-emoji">${S.game.emoji}</div></div>
    <h1 class="center" style="font-size:clamp(24px,8vw,30px)">${d.head}</h1>
    <div class="card" style="margin-top:16px;border-left:3px solid var(--gold)">
      <p style="font-size:clamp(16px,5vw,19px);line-height:1.55">${esc(d.text)}</p>
    </div>
    <div class="note" style="margin-top:14px">Cada um escolhe um lado e defende. Opcional: +1 ao melhor argumento no fim.</div>
    <div class="spacer"></div>
    <button class="btn btn-red btn-lg" data-action="toDiscuss">Debater ⏱</button>
    <div style="height:9px"></div>
    <button class="btn btn-ghost" data-action="finishNoScore">Pular pontuação e seguir →</button>
  </div>`;
}

let timerInt=null, wakeLock=null;
async function requestWake(){try{if('wakeLock'in navigator){wakeLock=await navigator.wakeLock.request('screen');}}catch(e){}}
function releaseWake(){try{if(wakeLock){wakeLock.release();wakeLock=null;}}catch(e){}}
function beep(){try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return;const a=new A();const o=a.createOscillator();const g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(.001,a.currentTime);g.gain.exponentialRampToValueAtTime(.25,a.currentTime+.02);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.6);o.start();o.stop(a.currentTime+.65);setTimeout(()=>a.close(),800);}catch(e){}}
function viewDiscuss(){
  const left=S.round.timeLeft;
  return `${bar()}<div class="screen center">
    <div class="kicker" style="margin-top:14px">${S.game.fam==='imp'?'Discussão — achem o impostor':'Discussão'}</div>
    <div class="timer-wrap"><div class="timer ${left<=15&&left>0?'warn':''}" id="timer">${fmt(left)}</div></div>
    <div class="row" style="gap:9px">
      <button class="btn btn-ghost grow" data-action="timerToggle" id="ttg">${S.round.paused?'▶ Continuar':'⏸ Pausar'}</button>
      <button class="btn btn-ghost grow" data-action="addTime">+30s</button>
    </div>
    <div class="spacer"></div>
    <button class="btn btn-red btn-lg" data-action="toResolve">Encerrar e resolver →</button>
  </div>`;
}
function tickStart(){
  clearInterval(timerInt); requestWake();
  timerInt=setInterval(()=>{
    if(S.screen!=='discuss'){clearInterval(timerInt);releaseWake();return;}
    if(S.round.paused)return;
    const left=Math.max(0,Math.ceil((S.round.endAt-Date.now())/1000));
    S.round.timeLeft=left;
    const el=$('#timer');
    if(el){el.textContent=fmt(left);el.classList.toggle('warn',left<=15&&left>0);}
    if(left<=0){clearInterval(timerInt);if(navigator.vibrate)navigator.vibrate([200,100,200]);beep();}
  },250);
}

function viewResolve(){
  const g=S.game,r=S.round;
  if(g.fam==='imp'){
    const impNames=r.impostors.map(i=>S.players[i].name).join(' e ');
    let extra='';
    if(g.id==='palavra'||g.id==='personagem'||g.id==='duplo')extra=`A palavra era <b style="color:var(--lime)">${esc(r.secretWord)}</b>.`;
    if(g.id==='coordenada')extra=`Cidade no nº <b style="color:var(--lime)">${r.realN}</b>, impostor no nº <b style="color:var(--red)">${r.impN}</b>.`;
    if(g.id==='invertida')extra=`Cidade: "${esc(r.pair[0])}" · Impostor: "${esc(r.pair[1])}".`;
    return `${bar()}<div class="screen center">
      <div class="kicker" style="margin-top:14px">Quem era?</div>
      <div class="big-emoji" style="margin:14px 0">🕵️</div>
      <h1 style="font-size:clamp(24px,8vw,30px);color:var(--red)">${esc(impNames)}</h1>
      <p class="muted" style="margin:10px 0 4px">${r.impostors.length>1?'eram os impostores':'era o impostor'}</p>
      <p class="muted" style="font-size:14px">${extra}</p>
      <div class="sec-label">A cidade descobriu?</div>
      <button class="btn btn-lime btn-lg" data-action="res:cidade">✅ Cidade venceu (+1 por inocente)</button>
      <div style="height:10px"></div>
      <button class="btn btn-red btn-lg" data-action="res:impostor">😈 Impostor escapou (+2)</button>
    </div>`;
  }
  if(g.fam==='reg'){
    const sel=r.regSel||[];
    const opts=S.players.map((p,i)=>`<button class="btn ${sel.includes(i)?'btn-lime':'btn-ghost'}" data-action="regToggle:${i}" style="margin-bottom:8px">${sel.includes(i)?'✓ ':''}${esc(p.name)}</button>`).join('');
    return `${bar()}<div class="screen">
      <h1 style="font-size:clamp(24px,8vw,28px);margin-top:10px" class="center">A regra era:</h1>
      <div class="note" style="margin:14px 0">${g.secret}</div>
      <div class="sec-label">Quem descobriu? (marque todos que acertaram)</div>
      ${opts}
      <div class="spacer"></div>
      <button class="btn btn-lime btn-lg" data-action="regConfirm" ${sel.length?'':'disabled'}>Confirmar — +1 para ${sel.length} jogador${sel.length===1?'':'es'} →</button>
      <div style="height:9px"></div>
      <button class="btn btn-red" data-action="res:reg:host">Ninguém descobriu — anfitrião (${esc(S.players[r.host].name)}) +2</button>
    </div>`;
  }
  if(g.id==='escala'){
    const order=r.cards.map((c,i)=>({n:S.players[i].name,v:+c.big})).sort((a,b)=>a.v-b.v)
      .map(o=>`<div class="prow"><div class="pn">${esc(o.n)}</div><div class="sp" style="font-size:18px;color:var(--lime)">${o.v}</div></div>`).join('');
    return `${bar()}<div class="screen">
      <h1 style="font-size:clamp(22px,7vw,26px);margin-top:10px" class="center">Ordem real (menor → maior)</h1>
      <p class="muted center" style="margin:6px 0 14px">${esc(r.prompt)}</p>
      <div class="plist">${order}</div>
      <div class="sec-label">O grupo acertou a ordem?</div>
      <button class="btn btn-lime btn-lg" data-action="res:escala:1">✅ Acertaram (todos +1)</button>
      <div style="height:9px"></div>
      <button class="btn btn-ghost" data-action="res:escala:0">❌ Erraram (0 ponto)</button>
    </div>`;
  }
  if(g.id==='pistas'){
    const cg=S.players[r.clueGiver].name;
    const opts=S.players.map((p,i)=>i===r.clueGiver?'':`<button class="btn btn-ghost" data-action="res:pistas:${i}" style="margin-bottom:8px">${esc(p.name)} acertou (+1 p/ ele e ${esc(cg)})</button>`).join('');
    return `${bar()}<div class="screen">
      <h1 style="font-size:clamp(22px,7vw,26px);margin-top:10px" class="center">O conceito era:</h1>
      <div class="reveal-card shown cidade" style="min-height:auto;margin:14px 0;padding:24px"><div class="big cid">${esc(r.concept)}</div></div>
      <div class="sec-label">Alguém acertou?</div>
      ${opts}
      <button class="btn btn-red" data-action="res:pistas:none">Ninguém acertou (0 ponto)</button>
    </div>`;
  }
  return '';
}

function viewScoreboard(){
  const sorted=[...S.players].map((p,i)=>({...p,i})).sort((a,b)=>b.score-a.score);
  const rows=sorted.map((p,k)=>`
    <div class="srow ${k===0&&p.score>0?'top1':''}">
      <div class="rank">${k===0&&p.score>0?'👑':k+1}</div>
      <div class="sn">${esc(p.name)}</div>
      <div class="sp">${p.score}</div>
    </div>`).join('');
  return `${bar()}<div class="screen">
    <h1 style="font-size:clamp(26px,9vw,32px);margin-top:6px">Placar</h1>
    <p class="muted" style="margin:8px 0 18px">Rodada ${S.currentRound} de ${S.rounds}.</p>
    ${rows||'<p class="faint center" style="padding:30px">Sem jogadores ainda.</p>'}
    <div class="spacer"></div>
    <button class="btn btn-ghost" data-go="${S.game?'play':'home'}">← Voltar</button>
  </div>`;
}

function viewChampion(){
  const sorted=[...S.players].map((p,i)=>({...p,i})).sort((a,b)=>b.score-a.score);
  const top=sorted[0]?sorted[0].score:0;
  const champs=sorted.filter(p=>p.score===top&&top>0);
  const champName=champs.length>1?champs.map(c=>c.name).join(' & '):(sorted[0]?sorted[0].name:'—');
  const skip=Math.max(1,champs.length);
  const rows=sorted.slice(skip).map((p,k)=>`
    <div class="srow"><div class="rank">${k+1+skip}</div><div class="sn">${esc(p.name)}</div><div class="sp">${p.score}</div></div>`).join('');
  return `${bar()}<div class="screen center">
    <div class="confetti" id="conf"></div>
    <div class="kicker" style="margin-top:20px">${champs.length>1?'Empate no topo!':'Campeão da noite'}</div>
    <div class="big-emoji" style="margin:16px 0;font-size:clamp(56px,18vw,70px)">🏆</div>
    <h1 style="font-size:clamp(32px,11vw,46px);color:var(--gold)">${esc(champName)}</h1>
    <p class="muted" style="margin:8px 0 24px">${top} pontos</p>
    <div style="text-align:left">${rows}</div>
    <div class="spacer"></div>
    <button class="btn btn-lime btn-lg" data-action="newNight">🔁 Nova noite (zerar placar)</button>
    <div style="height:9px"></div>
    <button class="btn btn-ghost" data-action="moreRounds">➕ Jogar mais 3 rodadas</button>
  </div>`;
}

/* =========================================================
   RENDER PRINCIPAL
========================================================= */
function render(){
  let html='';
  switch(S.screen){
    case 'home':html=viewHome();break;
    case 'players':html=viewPlayers();break;
    case 'config':html=viewConfig();break;
    case 'play':html=viewPlay();break;
    case 'briefing':html=viewBriefing();break;
    case 'reveal':html=viewReveal();break;
    case 'hostReveal':html=viewHostReveal();break;
    case 'clueReveal':html=viewClueReveal();break;
    case 'debate':html=viewDebate();break;
    case 'discuss':html=viewDiscuss();break;
    case 'resolve':html=viewResolve();break;
    case 'scoreboard':html=viewScoreboard();break;
    case 'champion':html=viewChampion();break;
  }
  app.innerHTML=html;
  if(S.screen==='discuss')tickStart();
  if(S.screen==='players'){const inp=$('#pname');if(inp){inp.focus();inp.onkeydown=e=>{if(e.key==='Enter')addPlayer();};}}
  if(S.screen==='config'){const ci=$('#cword');if(ci){ci.onkeydown=e=>{if(e.key==='Enter')addCustom();};}}
  if(S.screen==='champion')confetti();
  save();
}

/* =========================================================
   AÇÕES
========================================================= */
function addPlayer(){
  const inp=$('#pname');if(!inp)return;
  const name=inp.value.trim();if(!name)return;
  S.players.push({name,score:0});render();
}
function addCustom(){
  const inp=$('#cword');if(!inp)return;
  const parts=inp.value.split(/[,\n;]+/).map(s=>s.trim()).filter(Boolean);
  if(!parts.length)return;
  parts.forEach(w=>{if(!S.customWords.some(x=>x.toLowerCase()===w.toLowerCase()))S.customWords.push(w);});
  render();
}
function setupRound(){
  buildRound();
  const g=S.game;
  if(g.fam==='imp'||g.id==='escala')go('reveal');
  else if(g.fam==='reg')go('hostReveal');
  else if(g.id==='pistas')go('clueReveal');
  else if(g.fam==='deb')go('debate');
}
function applyResolve(action){
  const g=S.game,r=S.round;const parts=action.split(':');
  if(g.fam==='imp'){
    if(parts[1]==='cidade'){const inn=S.players.map((_,i)=>i).filter(i=>!r.impostors.includes(i));award(inn,1);}
    else{award(r.impostors,2);}
  } else if(g.fam==='reg'){
    if(parts[2]==='host')award([r.host],2);
  } else if(g.id==='escala'){
    if(parts[2]==='1')award(S.players.map((_,i)=>i),1);
  } else if(g.id==='pistas'){
    if(parts[2]!=='none')award([+parts[2],r.clueGiver],1);
  }
  nextRoundOrEnd();
}

document.addEventListener('click',(e)=>{
  const t=e.target.closest('[data-action],[data-go],[data-game],[data-rm],[data-theme],[data-step],[data-rmcw]');
  if(!t)return;
  if(t.dataset.go){go(t.dataset.go);return;}
  if(t.dataset.rm!==undefined){S.players.splice(+t.dataset.rm,1);render();return;}
  if(t.dataset.rmcw!==undefined){S.customWords.splice(+t.dataset.rmcw,1);render();return;}
  if(t.dataset.theme){S.theme=t.dataset.theme;render();return;}
  if(t.dataset.step){
    const [k,d]=t.dataset.step.split(':');const dv=+d;
    if(k==='rounds')S.rounds=Math.max(1,Math.min(30,S.rounds+dv));
    if(k==='discuss')S.discuss=Math.max(30,Math.min(600,S.discuss+dv));
    render();return;
  }
  if(t.dataset.game){const g=GAMES.find(x=>x.id===t.dataset.game);if(g&&playable(g))startGame(g);return;}

  const a=t.dataset.action;
  switch(true){
    case a==='toPlay':go(S.players.length>=2?'play':'players');break;
    case a==='newOrKeep':S.players.forEach(p=>p.score=0);S.currentRound=1;S.game=null;S.round=null;S.lastGameId=null;S.lastWord=null;go(S.players.length>=2?'play':'players');break;
    case a==='addP':addPlayer();break;
    case a==='addCW':addCustom();break;
    case a==='sortear':{
      let pool=GAMES.filter(playable);if(!pool.length)return;
      if(pool.length>1)pool=pool.filter(g=>g.id!==S.lastGameId);
      startGame(pool[rnd(pool.length)]);break;
    }
    case a==='setupRound':setupRound();break;
    case a==='flip':{
      const c=$('#rcard');const card=S.round.cards[S.round.revealIdx];
      if(c.classList.contains('hidden')){
        c.className='reveal-card shown '+(card.type==='imp'?'impostor':'cidade')+' flip-in';
        c.innerHTML=cardInner(card)+'<div style="margin-top:18px"><button class="btn btn-ghost btn-sm" data-action="nextReveal">Já vi — próximo →</button></div>';
      }break;
    }
    case a==='nextReveal':S.round.revealIdx++;render();break;
    case a==='flipHost':{
      const c=$('#rcard');
      c.className='reveal-card shown cidade flip-in';
      c.innerHTML=`<div class="kicker">Regra secreta</div><p style="font-size:16px;line-height:1.55;margin-top:12px">${S.game.secret}</p><div style="margin-top:18px"><button class="btn btn-lime btn-sm" data-action="toDiscuss">Entendi — começar ⏱</button></div>`;
      break;
    }
    case a==='reHost':S.round.host=rnd(S.players.length);render();break;
    case a==='flipClue':{
      const c=$('#rcard');
      c.className='reveal-card shown cidade flip-in';
      c.innerHTML=`<div class="kicker">Conceito secreto</div><div class="big cid" style="font-size:clamp(26px,8vw,34px);margin:12px 0">${esc(S.round.concept)}</div><p class="muted" style="font-size:13px">Dê 3 pistas, uma de cada vez.</p><div style="margin-top:16px"><button class="btn btn-lime btn-sm" data-action="toDiscuss">Começar ⏱</button></div>`;
      break;
    }
    case a==='reClue':S.round.clueGiver=rnd(S.players.length);render();break;
    case a==='toDiscuss':S.round.timeLeft=S.discuss;S.round.endAt=Date.now()+S.discuss*1000;S.round.paused=false;go('discuss');break;
    case a==='timerToggle':{
      if(!S.round.paused){S.round.paused=true;S.round.timeLeft=Math.max(0,Math.ceil((S.round.endAt-Date.now())/1000));releaseWake();}
      else{S.round.paused=false;S.round.endAt=Date.now()+S.round.timeLeft*1000;requestWake();}
      const b=$('#ttg');if(b)b.textContent=S.round.paused?'▶ Continuar':'⏸ Pausar';break;
    }
    case a==='addTime':{
      S.round.timeLeft+=30;
      if(!S.round.paused)S.round.endAt+=30000;
      const el=$('#timer');if(el)el.textContent=fmt(S.round.timeLeft);break;
    }
    case a==='toResolve':clearInterval(timerInt);releaseWake();go('resolve');break;
    case a==='finishNoScore':nextRoundOrEnd();break;
    case a&&a.startsWith('regToggle:'):{
      const i=+a.split(':')[1];if(!S.round.regSel)S.round.regSel=[];
      const k=S.round.regSel.indexOf(i);if(k>=0)S.round.regSel.splice(k,1);else S.round.regSel.push(i);
      render();break;
    }
    case a==='regConfirm':{const sel=S.round.regSel||[];if(!sel.length)break;award(sel,1);nextRoundOrEnd();break;}
    case a&&a.startsWith('res:'):applyResolve(a);break;
    case a==='newNight':S.players.forEach(p=>p.score=0);S.currentRound=1;S.game=null;S.round=null;S.lastGameId=null;S.lastWord=null;go('home');break;
    case a==='moreRounds':S.rounds+=3;S.currentRound++;S.game=null;S.round=null;go('play');break;
  }
});

document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&S.screen==='discuss'&&S.round&&!S.round.paused)requestWake();
});

function confetti(){
  const c=$('#conf');if(!c)return;
  const cols=['#ffcb45','#c6f24e','#ff3b5c','#8ec0ff','#fff'];
  for(let i=0;i<70;i++){
    const d=document.createElement('div');d.className='conf';
    d.style.left=Math.random()*100+'%';
    d.style.background=cols[rnd(cols.length)];
    d.style.animationDuration=(2+Math.random()*2.5)+'s';
    d.style.animationDelay=Math.random()*1.2+'s';
    d.style.transform='rotate('+rnd(360)+'deg)';
    c.appendChild(d);
  }
  setTimeout(()=>{if(c)c.innerHTML='';},5000);
}

load();
